  const restSession = {
    date: today, week_number: appData.week, is_deload: false,
    exercises: [], patterns_used: [], priority_pattern_gap: null,
    rating: null, wasRestDay: true
  };
  appData.history.push(restSession);
  appData.streak += 1;
  const realSessions = appData.history.filter(s => !s.wasRestDay).length;
  if (realSessions % 7 === 0 && realSessions > 0) appData.week += 1;
  saveAppData(appData);
  alert('✅ Rest day logged. See you tomorrow!');
  location.reload();
}

function renderWorkout(result) {
  const app = document.getElementById('app');
  const session = result.session;
  const voice = result.voiceMessage;
  const appData = getAppData();
  const experience = appData.userProfile?.experience || 'beginner';
  const experience = appData.userProfile?.experience || 'beginner';

  let html = renderHeader(appData.streak, session.week_number);
  html += `<div class="voice-box">📢 ${voice}</div>`;

  html += `<div class="card"><div class="card-title">🏋️ Today's Trial ${session.is_deload ? '<span class="badge">Recovery</span>' : ''}</div>`;

  session.exercises.forEach((ex, i) => {
    html += `<div class="exercise-card">`;
    html += `<div class="ex-header">`;
    html += `<span class="ex-number">#${i+1}</span>`;
    html += `<span class="ex-name">${ex.name}</span>`;
    html += `</div>`;
    html += `<div class="ex-metrics">`;
    html += `<span class="metric">🏋️ Sets: <strong>${ex.sets}</strong></span>`;
    if (ex.rep_mode === 'timed' || ex.rep_mode === 'interval') {
      html += `<span class="metric">⏱️ Duration: <strong class="highlight">${ex.duration_seconds}s</strong></span>`;
    } else if (ex.rep_mode === 'distance') {
      html += `<span class="metric">📏 Distance: <strong class="highlight">${ex.reps_max}m</strong></span>`;
    } else {
      html += `<span class="metric">🔁 Reps: <strong class="highlight">${ex.reps_min}–${ex.reps_max}</strong>${ex.is_unilateral ? ' per side' : ''}</span>`;
    }
    if (ex.rpe_target) html += `<span class="metric">🎯 RPE: <strong>${ex.rpe_target}</strong></span>`;
    html += `</div>`;
    if (ex.tempo_note) {
      const tempoCode = (ex.tempo_code && experience !== 'beginner')
        ? `<span style="font-family:monospace;color:var(--accent);margin-right:8px;">[${ex.tempo_code}]</span>`
        : '';
      html += `<div class="metric" style="font-size:0.8rem;color:var(--text-muted);">⏳ ${tempoCode}${ex.tempo_note}</div>`;
    }
    if (ex.cues && ex.cues.length > 0) {
      html += `<div class="ex-cues">💡 ${ex.cues.map(c => `<span>${c}</span>`).join(' ')}</div>`;
    }
    html += `</div>`;
  });
  html += `</div>`;

  // Performance logging
  html += `<div class="card"><div class="card-title">📝 Log Performance</div>`;
  session.exercises.forEach((ex, i) => {
    html += `<label>${ex.name}:</label>`;
    if (ex.rep_mode === 'timed' || ex.rep_mode === 'interval') {
      html += `<input type="number" id="dur-${i}" placeholder="Duration (s)" value="${ex.duration_seconds}">`;
    } else if (ex.rep_mode === 'distance') {
      html += `<input type="number" id="dist-${i}" placeholder="Distance (m)" value="${ex.reps_max}">`;
    } else {
      html += `<div style="display:flex; gap:10px; flex-wrap:wrap;">`;
      html += `<input type="number" id="reps-${i}" placeholder="Reps" value="${ex.reps_max}" style="max-width:120px;">`;
      html += `<input type="number" id="sets-${i}" placeholder="Sets" value="${ex.sets}" style="max-width:120px;">`;
      html += `</div>`;
    }
  });

  html += `<label style="margin-top:20px;">How did this session feel?</label>`;
  html += `<div class="rating-grid">`;
  const ratings = [
    { val: 1, label: 'TRIVIAL' },
    { val: 2, label: 'MANAGEABLE' },
    { val: 3, label: 'OPTIMAL' },
    { val: 4, label: 'DEMANDING' },
    { val: 5, label: 'LIMIT REACHED' }
  ];
  ratings.forEach(r => {
    html += `<button type="button" class="rating-btn" data-value="${r.val}" onclick="selectRating(this, ${r.val})">
              ${r.label}
            </button>`;
  });
  html += `</div>`;
  html += `<input type="hidden" id="rating" value="3">`;

  html += `<div class="btn-group">`;
  html += `<button class="btn-primary" onclick="submitWorkout()">✅ Complete Trial</button>`;
  html += `<button class="btn-secondary" onclick="logRestDay()">🛌 Rest Day</button>`;
  html += `</div></div>`;

  app.innerHTML = html;

  // Highlight default rating (Just right)
  setTimeout(() => {
    const defaultBtn = document.querySelector('.rating-btn[data-value="3"]');
    if (defaultBtn) defaultBtn.classList.add('active');
  }, 50);
}

function submitWorkout() {
  const appData = getAppData();
  const savedSession = window.__currentSession;
  if (!savedSession) { alert('Session data missing. Please refresh.'); return; }
  const session = savedSession;

  const completedExercises = session.exercises.map((ex, i) => {
    let perf = {};
    if (ex.rep_mode === 'timed' || ex.rep_mode === 'interval') {
      const el = document.getElementById(`dur-${i}`);
      perf.actual_duration_achieved = el ? parseInt(el.value) || ex.duration_seconds : ex.duration_seconds;
    } else if (ex.rep_mode === 'distance') {
      const el = document.getElementById(`dist-${i}`);
      perf.actual_distance_achieved = el ? parseInt(el.value) || ex.reps_max : ex.reps_max;
    } else {
      const repsEl = document.getElementById(`reps-${i}`);
      const setsEl = document.getElementById(`sets-${i}`);
      perf.actual_reps_achieved = repsEl ? parseInt(repsEl.value) || ex.reps_max : ex.reps_max;
      perf.actual_sets_completed = setsEl ? parseInt(setsEl.value) || ex.sets : ex.sets;
    }
    return perf;
  });

  const rating = parseInt(document.getElementById('rating').value) || 3;

  const mergedExercises = session.exercises.map((ex, i) => {
    const perf = completedExercises[i] || {};
    return {
      ...ex,
      actual_sets_completed: perf.actual_sets_completed ?? ex.sets,
      actual_reps_achieved: perf.actual_reps_achieved ?? (ex.reps_max || 0),
      actual_duration_achieved: perf.actual_duration_achieved ?? (ex.duration_seconds || 0),
      actual_distance_achieved: perf.actual_distance_achieved ?? (ex.reps_max || 0),
    };
  });

  const completedSession = { ...session, exercises: mergedExercises, rating };
  appData.history.push(completedSession);
  appData.streak += 1;
  const realSessions = appData.history.filter(s => !s.wasRestDay).length;
  if (realSessions % 7 === 0 && realSessions > 0) appData.week += 1;
  if (result.meta.firstProgressionOccurred) appData.userProfile.hasFirstProgressionHappened = true;
  saveAppData(appData);

  alert('✅ Session recorded! See you tomorrow, hunter.');
  location.reload();
}

// ============================================================
// 6. BOOT
// ============================================================
window.onload = function() {
  const appData = getAppData();

  // Streak reset logic
  if (appData.userProfile && appData.history.length > 0) {
    const today = new Date().toISOString().split('T')[0];
    const lastSession = appData.history[appData.history.length - 1];
    const lastDate = lastSession.date;
    if (lastDate !== today) {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = yesterday.toISOString().split('T')[0];
      if (lastDate !== yesterdayStr && lastDate !== today) {
        appData.streak = 0;
        saveAppData(appData);
      }
    }
  }

  if (!appData.userProfile) {
    renderSetup();
    return;
  }

  const today = new Date().toISOString().split('T')[0];
  if (appData.history.length > 0) {
    const lastSession = appData.history[appData.history.length - 1];
    if (lastSession.date === today && !lastSession.wasRestDay) {
      const app = document.getElementById('app');
      app.innerHTML = renderHeader(appData.streak, appData.week);
      app.innerHTML += `
        <div class="card done-state">
          <div class="big-icon">✅</div>
          <h2>Today's training is complete!</h2>
          <p style="margin:10px 0 20px 0;">Come back tomorrow, hunter.</p>
          <button class="btn-primary" onclick="location.reload()">🔄 Refresh</button>
        </div>
      `;
      return;
    }
  }

  const yesterday = appData.history.length > 0 ? appData.history[appData.history.length - 1] : null;
  const result = buildTodaySession({
    userProfile: appData.userProfile,
    yesterdaySession: yesterday,
    sessionHistory: appData.history,
    exerciseLibrary: exerciseLibrary,
    weekNumber: appData.week,
    streakDays: appData.streak,
  });

  if (result.session === null) {
    const app = document.getElementById('app');
    app.innerHTML = renderHeader(appData.streak, appData.week);
    app.innerHTML += `
      <div class="voice-box">📢 ${result.voiceMessage}</div>
      <div class="card done-state">
        <div class="big-icon">🛌</div>
        <h2>Scheduled Rest Day</h2>
        <p style="margin:10px 0 20px 0;">The System has no trial assigned today.</p>
        <button class="btn-secondary" onclick="logRestDay()">Log Rest Day</button>
      </div>
    `;
    return;
  }

  window.__currentSession = result.session;
  renderWorkout(result);
};
