  pike_pushup: { id:"pike_pushup", name:"Pike Push-up", movement_pattern:"push", equipment_required:[], difficulty:3, class_affinity:["warrior","assassin","mage"], muscles_primary:["anterior deltoid","lateral deltoid","triceps"], muscles_secondary:["upper pectoralis","serratus anterior","core"], sets_default:3, reps_min:8, reps_max:10, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"2-1-2-0", tempo_note:"Hips high in an inverted V shape, lower the top of your head toward the floor for 2 seconds, push back up", regression_id:"pushup_feet_elevated", progression_id:"pike_pushup_elevated", cues:["[beginner] Start in a downward dog position — hips high, body forming an inverted V","[beginner] Lower the top of your head toward the floor between your hands","[beginner] Push back up to the starting position — this is a vertical pressing movement, not a chest push-up","[intermediate] The more vertical your torso, the more it resembles a shoulder press","[intermediate] Keep elbows from flaring excessively — slight outward track is fine but not 90 degrees","[intermediate] Full range of motion — head nearly touches floor at the bottom, arms fully extended at the top","[advanced] Elevating feet increases the vertical demand significantly","[advanced] This is your primary overhead strength builder with no equipment","[advanced] Progress toward wall-facing handstand negatives from the elevated version"], common_mistakes:["Hips dropping during the movement and turning it into a push-up","Not going low enough — head should nearly touch the floor","Jumping straight to elevated version before flat pike is controlled"], tutorial_url:"https://www.youtube.com/watch?v=sposDGMQmqM", notes:"The only true overhead pressing movement available without equipment." },
  pike_pushup_elevated: { id:"pike_pushup_elevated", name:"Pike Push-up — Feet Elevated", movement_pattern:"push", equipment_required:["chair"], difficulty:5, class_affinity:["warrior","assassin"], muscles_primary:["anterior deltoid","lateral deltoid","triceps"], muscles_secondary:["upper pectoralis","serratus anterior","core"], sets_default:3, reps_min:6, reps_max:8, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"2-1-2-0", tempo_note:"Feet elevated on chair — the overhead pressing demand increases significantly", regression_id:"pike_pushup", progression_id:null, cues:["[beginner] Master flat pike push-ups first — this variation is a significant jump in difficulty","[intermediate] Feet on chair, hands on floor — the more elevated the feet the more vertical the press","[intermediate] Head travels straight down between hands to the floor","[intermediate] Keep hips directly above shoulders as much as possible","[advanced] At full elevation with hips stacked over shoulders this becomes a handstand push-up negative","[advanced] Wall-facing handstand negatives are the natural next step — find a wall, kick up, lower slowly","[advanced] This is the ceiling of overhead push progression with available equipment"], common_mistakes:["Hips drifting backward as fatigue sets in — reducing the overhead demand","Insufficient elevation to get meaningful overhead stimulus","Rushing reps — this movement requires full control at every point"], tutorial_url:"https://www.youtube.com/watch?v=sposDGMQmqM", notes:"Ceiling of overhead push progression." },
  pallof_pressout: { id:"pallof_pressout", name:"Pallof Press-Out (Dumbbell)", movement_pattern:"push", equipment_required:["dumbbells"], difficulty:2, class_affinity:["warrior","tank","mage","ranger"], muscles_primary:["core — anti-rotation","obliques"], muscles_secondary:["anterior deltoid","triceps","transverse abdominis"], sets_default:3, reps_min:8, reps_max:8, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"2-2-2-0", tempo_note:"Hold the dumbbell at your chest with both hands, press it straight out in front of you slowly, hold for 2 seconds, bring it back in", regression_id:null, progression_id:null, cues:["[beginner] Half-kneeling position — one knee down, one foot forward","[beginner] Hold a 5 kg dumbbell at your chest with both hands","[beginner] Press it straight out in front of you and resist any urge to rotate your torso","[intermediate] The challenge is keeping your torso completely square while the weight tries to pull you into rotation","[intermediate] Breathe out as you press out, hold, breathe in as you return","[intermediate] The kneeling position eliminates lower body compensation — the core has to do all the work","[advanced] After the anti-rotation press, add a slow controlled rotation toward the hip and back","[advanced] This trains anti-rotation on the press and controlled rotation on the return — both matter for spine health","[advanced] Progress to standing position for increased demand on hip stability"], common_mistakes:["Torso rotating as the dumbbell is pressed out — the whole point is to resist this","Standing instead of kneeling — removes the core isolation","Using too heavy a dumbbell and compensating with torso rotation"], tutorial_url:"https://www.youtube.com/watch?v=AH_QZLm_0-s", notes:"Anti-rotation pressing is as important as pure pushing strength." },
  // PUSH — GYM
  dumbbell_bench_press: { id:"dumbbell_bench_press", name:"Dumbbell Bench Press", movement_pattern:"push", equipment_required:["dumbbells","chair"], difficulty:2, class_affinity:["warrior","tank","assassin","ranger"], muscles_primary:["pectoralis major","anterior deltoid","triceps"], muscles_secondary:["serratus anterior","core"], sets_default:3, reps_min:10, reps_max:12, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-1-1-0", tempo_note:"Lower the dumbbells slowly for 3 seconds until they reach chest level, press back up — dumbbells allow more range of motion than a barbell", regression_id:"pushup_standard", progression_id:"barbell_bench_press", cues:["[beginner] Lie on a bench, dumbbells at chest level, elbows at roughly 45–60 degrees from your torso","[beginner] Press the dumbbells up and slightly together at the top — full arm extension","[beginner] Lower slowly until the dumbbells are at chest height — don't let them go too far below the chest", "[intermediate] Retract the shoulder blades and drive them into the bench — this protects the shoulder and creates a stable base","[intermediate] The range of motion advantage over barbell is real — use it by allowing a controlled stretch at the bottom","[intermediate] Elbows at 45–60 degrees, not 90 — 90 degrees puts unnecessary stress on the shoulder joint","[advanced] The independent dumbbell path exposes and corrects left-right strength asymmetry","[advanced] Pause reps at the bottom eliminate elastic rebound and increase pectoral demand significantly","[advanced] Slow eccentrics followed by explosive concentrics is the optimal tempo for hypertrophy here"], common_mistakes:["Elbows flaring to 90 degrees — shoulder impingement risk","Dumbbells going too low past the chest — shoulder strain without additional benefit","Not retracting shoulder blades — unstable base and reduced pressing power"], tutorial_url:"https://www.youtube.com/watch?v=QsYre__-aro", notes:"More range of motion than barbell bench and better for identifying asymmetries." },
  barbell_bench_press: { id:"barbell_bench_press", name:"Barbell Bench Press", movement_pattern:"push", equipment_required:["barbell"], difficulty:3, class_affinity:["warrior","tank"], muscles_primary:["pectoralis major","anterior deltoid","triceps"], muscles_secondary:["serratus anterior","core","latissimus dorsi"], sets_default:4, reps_min:5, reps_max:8, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-1-1-0", tempo_note:"Lower the bar to your lower chest with control for 3 seconds, press back up with intent — don't bounce the bar off the chest", regression_id:"dumbbell_bench_press", progression_id:null, cues:["[beginner] Grip just outside shoulder-width, bar over the lower chest when unracked","[beginner] Retract shoulder blades and drive them into the bench — this is your foundation","[beginner] Lower to just below the nipple line — touching the chest, not bouncing off it","[intermediate] Leg drive — feet flat on the floor, push through the heels to create full-body tension","[intermediate] Think about bending the bar outward as you press — this engages the lats and keeps elbows from flaring","[intermediate] The bar path is diagonal — it travels back over the face at the top, not straight up","[advanced] The arch debate: a natural arch with shoulder blades retracted is fine. Extreme powerlifting arch is a choice for competition, not general training","[advanced] Controlled eccentric, pause at the chest, explosive press is the most effective training variation","[advanced] Touch the chest every rep — if you can't, the weight is too heavy or the range of motion is being cut"], common_mistakes:["Bouncing the bar off the chest — takes tension off the muscle and risks injury","Elbows flaring to 90 degrees — shoulder impingement under heavy load","Unracking with bent arms and immediately pressing — set your position first"], tutorial_url:"https://www.youtube.com/watch?v=vcBig73ojpE", notes:"The primary horizontal pressing exercise for loaded strength." },
  incline_dumbbell_press: { id:"incline_dumbbell_press", name:"Incline Dumbbell Press", movement_pattern:"push", equipment_required:["dumbbells","chair"], difficulty:3, class_affinity:["warrior","tank","assassin"], muscles_primary:["upper pectoralis major","anterior deltoid","triceps"], muscles_secondary:["serratus anterior","core"], sets_default:3, reps_min:10, reps_max:12, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-1-1-0", tempo_note:"Lower slowly for 3 seconds to chest level, press back up — the incline angle shifts the work to the upper chest", regression_id:"dumbbell_bench_press", progression_id:null, cues:["[beginner] Set the bench to 30–45 degrees — higher angles shift the work to shoulders rather than chest","[beginner] Dumbbells start at shoulder level, press up and slightly together","[beginner] Lower until dumbbells reach chest level — controlled, no bounce","[intermediate] 30 degrees is generally optimal for upper chest emphasis — steeper than 45 and you're doing a shoulder press","[intermediate] Shoulder blade retraction is harder on an incline but still necessary","[intermediate] The stretch at the bottom on an incline is shallower than flat bench — go slightly deeper with control","[advanced] Upper chest is chronically underdeveloped in most people because flat pressing dominates programs — prioritize this","[advanced] Incline dumbbell press is preferable to incline barbell for most people because of the freer range of motion","[advanced] Pair with flat bench in the same session for complete pectoral coverage"], common_mistakes:["Bench too steep — this becomes a shoulder press at 60+ degrees","Not retracting shoulder blades — same error as flat bench","Dumbbells drifting too wide at the bottom instead of tracking at roughly 45 degrees"], tutorial_url:"https://www.youtube.com/watch?v=0G2_XV7slIg", notes:"Upper chest work is non-negotiable for balanced pressing development." },
  barbell_overhead_press: { id:"barbell_overhead_press", name:"Barbell Overhead Press", movement_pattern:"push", equipment_required:["barbell"], difficulty:3, class_affinity:["warrior","tank","assassin"], muscles_primary:["anterior deltoid","lateral deltoid","triceps"], muscles_secondary:["upper pectoralis","serratus anterior","core","traps"], sets_default:4, reps_min:5, reps_max:8, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-1-1-0", tempo_note:"Lower the bar to your clavicle with control for 3 seconds, press straight up and slightly back at the top — the bar should pass close to your face", regression_id:"pike_pushup_elevated", progression_id:null, cues:["[beginner] Grip just outside shoulder-width, bar resting on your clavicles and front deltoids","[beginner] Press the bar straight up — your head moves back slightly to let the bar pass, then forward again at the top","[beginner] Full lockout at the top with biceps close to your ears","[intermediate] Brace the core and squeeze the glutes before pressing — this is a full-body exercise","[intermediate] The bar should be as vertical as possible when viewed from the side — forward drift loads the shoulders badly","[intermediate] Elbows at roughly 45–60 degrees from the torso at the start — not directly in front or directly to the side","[advanced] The overhead press is one of the most honest strength tests — no leg drive, no arch, just shoulder and tricep strength","[advanced] Press the bar back slightly at the very top to achieve the most efficient overhead lockout position","[advanced] Strict press strength transfers directly to athletic overhead performance in a way that dumbbell pressing doesn't fully replicate"], common_mistakes:["Bar drifting forward instead of going straight up — the most common error","Lower back arching to press heavier than the shoulders can actually handle","Not reaching full lockout at the top"], tutorial_url:"https://www.youtube.com/watch?v=2yjwXTZQDDI", notes:"The most honest overhead strength test." },
  cable_chest_fly: { id:"cable_chest_fly", name:"Cable Chest Fly", movement_pattern:"push", equipment_required:["cable_machine"], difficulty:2, class_affinity:["warrior","tank","assassin"], muscles_primary:["pectoralis major — stretch emphasis"], muscles_secondary:["anterior deltoid","biceps — lengthened"], sets_default:3, reps_min:12, reps_max:15, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-2-1-0", tempo_note:"Open arms slowly for 3 seconds, feel the pec stretch, hold for 2 seconds, bring arms together — this is a stretch and contraction exercise, not a power exercise", regression_id:"dumbbell_bench_press", progression_id:null, cues:["[beginner] Set cables at chest height, stand in the center with one foot forward for balance","[beginner] Slight bend in the elbows throughout — this is not a straight-arm movement","[beginner] Open arms wide until you feel a stretch across the chest, then bring them together","[intermediate] The cable provides constant tension throughout the range of motion — unlike dumbbells which lose tension at the top","[intermediate] The stretch at the open position is the primary stimulus — don't rush through it","[intermediate] Squeeze the pecs hard as the hands come together — imagine hugging a tree","[advanced] This is an isolation and stretch exercise — pair it after compound pressing, not instead of it","[advanced] High cable position emphasizes lower pec, low cable position emphasizes upper pec","[advanced] The 2-second hold at the stretched position is where the pec receives the most growth stimulus — never skip it"], common_mistakes:["Straightening the elbows fully and turning it into a cable raise","Rushing through the stretched position — this defeats the entire purpose","Using too much weight and losing the arc motion — turning it into a pull"], tutorial_url:"https://www.youtube.com/watch?v=taI4XduLpTk", notes:"The cable fly provides constant tension that dumbbell flys lose at the top." },

  // CARRY
  farmers_carry_bilateral: { id:"farmers_carry_bilateral", name:"Bilateral Farmer's Carry", movement_pattern:"carry", equipment_required:["dumbbells"], difficulty:1, class_affinity:["warrior","tank","ranger"], muscles_primary:["grip","forearms","trapezius"], muscles_secondary:["core","glutes","quadriceps"], sets_default:3, reps_min:40, reps_max:40, rep_mode:"distance", is_unilateral:false, duration_seconds:null, tempo_code:null, tempo_note:"Walk tall and steady — imagine balancing a book on your head. Don't let the dumbbells pull your shoulders forward or down", regression_id:null, progression_id:"farmers_carry_single", cues:["[beginner] Hold one dumbbell in each hand hanging at your sides","[beginner] Stand tall — shoulders back, chest up, eyes forward","[beginner] Walk smoothly — no waddling, no leaning side to side","[intermediate] Squeeze the handles hard — grip intensity directly drives forearm and trap activation","[intermediate] Keep shoulders packed down away from ears throughout","[intermediate] Breathe rhythmically — don't hold your breath under load","[advanced] At 5 kg per hand this is a warm-up — use a loaded backpack in one or both hands to increase challenge","[advanced] Focus on gait quality — each step should look identical, no asymmetry","[advanced] Accumulate total distance across sets rather than chasing heavier load with poor form"], common_mistakes:["Shoulders creeping up toward ears as fatigue sets in","Leaning forward at the torso","Shuffling steps instead of walking with full stride"], tutorial_url:"https://www.youtube.com/watch?v=rt17lmnaLSM", notes:"Entry point for all carry work." },
  farmers_carry_single: { id:"farmers_carry_single", name:"Single-Arm Farmer's Carry", movement_pattern:"carry", equipment_required:["dumbbells"], difficulty:2, class_affinity:["warrior","tank","assassin","ranger"], muscles_primary:["grip","forearms","obliques","quadratus lumborum"], muscles_secondary:["trapezius","glutes","core"], sets_default:3, reps_min:40, reps_max:40, rep_mode:"distance", is_unilateral:true, duration_seconds:null, tempo_code:null, tempo_note:"Walk tall and don't lean toward the dumbbell side — your body will want to tilt, resist it", regression_id:"farmers_carry_bilateral", progression_id:"farmers_carry_rack", cues:["[beginner] Hold one dumbbell in one hand, other hand free","[beginner] Don't let your torso lean toward the dumbbell side — stand completely upright","[beginner] Your core is working hard to prevent the lean — that's the point","[intermediate] The quadratus lumborum on the non-loaded side is the primary stabilizer here","[intermediate] Keep the loaded shoulder packed down — don't let it shrug up as fatigue hits","[intermediate] Switch sides and note any asymmetry — most people have a weaker side","[advanced] With 5 kg the distance and time under load are your progression tools","[advanced] A loaded backpack in one hand dramatically increases the anti-lateral-flexion demand","[advanced] Identifying and correcting left-right asymmetry here translates directly to injury prevention"], common_mistakes:["Torso leaning toward the loaded side — reduces the core demand entirely","Loaded shoulder shrugging up toward the ear","Walking too fast and losing postural control"], tutorial_url:"https://www.youtube.com/watch?v=pB2sOGH0akk", notes:"Unilateral demand makes this significantly harder." },
  farmers_carry_rack: { id:"farmers_carry_rack", name:"Rack Carry (Dumbbell)", movement_pattern:"carry", equipment_required:["dumbbells"], difficulty:3, class_affinity:["warrior","tank"], muscles_primary:["core","obliques","upper back","grip"], muscles_secondary:["anterior deltoid","biceps","quadratus lumborum"], sets_default:3, reps_min:30, reps_max:40, rep_mode:"distance", is_unilateral:true, duration_seconds:null, tempo_code:null, tempo_note:"Hold the dumbbell at shoulder height — elbow bent, dumbbell resting on the front of your shoulder. Walk tall and keep the dumbbell from tipping forward", regression_id:"farmers_carry_single", progression_id:"farmers_carry_overhead", cues:["[beginner] Hold the dumbbell at shoulder height with elbow bent — like the top of a bicep curl","[beginner] The dumbbell rests on your shoulder and forearm, not just gripped in the air","[beginner] Walk tall — don't let the weight pull your elbow down or torso sideways","[intermediate] The rack position challenges anterior core and shoulder stability simultaneously","[intermediate] Keep the elbow at roughly 90 degrees throughout — don't let it drop","[intermediate] Breathe into your ribcage — the rack position compresses breathing slightly which increases core demand","[advanced] Combining rack carry one side and farmer's carry the other is one of the most complete unilateral carries available","[advanced] The asymmetrical load creates rotational demand the core must resist","[advanced] Progress to overhead carry when rack carry feels stable and controlled"], common_mistakes:["Elbow dropping and dumbbell drifting forward away from the shoulder","Torso leaning away from the loaded side","Holding breath instead of breathing through the carry"], tutorial_url:"https://www.youtube.com/watch?v=TGPKSKlrpCo", notes:"The rack position is a completely different stability challenge." },
  farmers_carry_overhead: { id:"farmers_carry_overhead", name:"Overhead Carry (Dumbbell)", movement_pattern:"carry", equipment_required:["dumbbells"], difficulty:4, class_affinity:["warrior","assassin"], muscles_primary:["shoulder stabilizers","rotator cuff","core"], muscles_secondary:["triceps","upper trapezius","obliques"], sets_default:3, reps_min:20, reps_max:30, rep_mode:"distance", is_unilateral:true, duration_seconds:null, tempo_code:null, tempo_note:"Press the dumbbell directly overhead with a locked elbow, then walk — if the elbow bends or the shoulder wobbles, the load is too heavy or the pattern isn't ready", regression_id:"farmers_carry_rack", progression_id:null, cues:["[beginner] Press one dumbbell directly overhead — arm fully locked out, bicep close to your ear","[beginner] Keep your ribcage down — don't arch your lower back to get the arm overhead","[beginner] Walk slowly — this exposes shoulder stability issues immediately","[intermediate] The locked elbow is non-negotiable — a bent elbow means the shoulder isn't stable enough for this variation yet","[intermediate] Keep the dumbbell stacked directly over the shoulder joint — not in front or behind","[intermediate] Eyes forward, not up at the dumbbell — trust the position","[advanced] The combination of overhead plus farmer's carry opposite side is one of the hardest unilateral core challenges available with this equipment","[advanced] Any pain or clicking overhead means regress immediately — this pattern requires genuine shoulder mobility and stability","[advanced] At 5 kg this is a stability challenge not a strength challenge — that's the correct use of it"], common_mistakes:["Lower back arching to compensate for limited shoulder mobility","Elbow bending under the load","Dumbbell drifting forward in front of the ear instead of stacking over the joint"], tutorial_url:"https://www.youtube.com/watch?v=5T4DMLF0nDo", notes:"Ceiling of carry progression." },
  loaded_ruck: { id:"loaded_ruck", name:"Loaded Ruck (Backpack)", movement_pattern:"carry", equipment_required:["backpack","dumbbells"], difficulty:2, class_affinity:["warrior","tank","ranger"], muscles_primary:["trapezius","erector spinae","glutes"], muscles_secondary:["core","quadriceps","grip"], sets_default:1, reps_min:45, reps_max:60, rep_mode:"timed", is_unilateral:false, duration_seconds:2700, tempo_code:null, tempo_note:"Start with 5–8 kg in the backpack and walk at a brisk pace — you should be able to hold a conversation but feel the load by the end", regression_id:"farmers_carry_bilateral", progression_id:null, cues:["[beginner] Pack both dumbbells in the backpack with towels around them so they don't shift","[beginner] Stand tall — the loaded pack will want to pull you forward at the shoulders","[beginner] Start with flat terrain and shorter duration before adding hills or distance","[intermediate] Weight should sit high in the pack close to your back — low and loose weight ruins posture","[intermediate] Swing your arms naturally — don't let the pack restrict your gait","[intermediate] Varied terrain dramatically increases the stimulus — hills, grass, and uneven ground all add challenge","[advanced] This is your primary bone density and postural endurance tool","[advanced] At 10–15% bodyweight for 60–90 min you are doing serious work for skeletal health","[advanced] Combine with zone 2 heart rate for a cardiovascular and structural training session simultaneously"], common_mistakes:["Pack straps too loose causing the load to shift and pull backward","Leaning forward at the torso to compensate for the load","Starting too heavy or too long and accumulating joint fatigue before adapting"], tutorial_url:"https://www.youtube.com/watch?v=MHByBoKQAKM", notes:"The most longevity-dense single activity." },
  // CORE
  dead_bug: { id:"dead_bug", name:"Dead Bug", movement_pattern:"core", equipment_required:[], difficulty:1, class_affinity:["warrior","tank","assassin","mage","ranger"], muscles_primary:["transverse abdominis","rectus abdominis"], muscles_secondary:["hip flexors","lower back — anti-extension"], sets_default:3, reps_min:8, reps_max:8, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"3-1-3-0", tempo_note:"Lower one arm and the opposite leg slowly toward the floor for 3 seconds, then bring them back up — your lower back must stay pressed to the floor the entire time", regression_id:null, progression_id:"hollow_body_hold", cues:["[beginner] Lie on your back, arms pointing to the ceiling, knees bent at 90 degrees in the air","[beginner] Press your lower back firmly into the floor — this must not change throughout the movement","[beginner] Lower one arm overhead and the opposite leg toward the floor simultaneously, then return","[intermediate] The lower back contact with the floor is the only cue that matters — everything else is secondary","[intermediate] Exhale fully before each rep — this engages the transverse abdominis automatically","[intermediate] If your lower back lifts off the floor at any point, your range of motion is too large — reduce it","[advanced] Hold a 5 kg dumbbell in the extending arm for increased anti-extension demand","[advanced] Full range — arm touches floor overhead, heel hovers just above the floor","[advanced] Breathing pattern — exhale on the lower, inhale on the return"], common_mistakes:["Lower back arching off the floor — the most common error","Moving too fast and using momentum instead of control","Holding breath throughout the movement"], tutorial_url:"https://www.youtube.com/watch?v=4XLEnwUr1d8", notes:"The best anti-extension core exercise for beginners." },
  hollow_body_hold: { id:"hollow_body_hold", name:"Hollow Body Hold", movement_pattern:"core", equipment_required:[], difficulty:3, class_affinity:["warrior","assassin","mage"], muscles_primary:["transverse abdominis","rectus abdominis","hip flexors"], muscles_secondary:["lower back — anti-extension","serratus anterior"], sets_default:3, reps_min:30, reps_max:60, rep_mode:"timed", is_unilateral:false, duration_seconds:45, tempo_code:null, tempo_note:"Hold the position for as long as you can keep your lower back on the floor — 10 seconds with perfect form beats 30 seconds with an arched back", regression_id:"dead_bug", progression_id:"hollow_body_rock", cues:["[beginner] Lie on your back, press your lower back into the floor","[beginner] Raise your arms overhead and legs off the floor — find the lowest position where your back stays flat","[beginner] Hold that position — it should feel hard within 15–20 seconds","[intermediate] Arms reach overhead, legs extended and low — the lower the legs the harder it is","[intermediate] Ribs down — don't let the ribcage flare upward","[intermediate] Think about pulling your belly button toward your spine throughout","[advanced] Add a 5 kg dumbbell held overhead or between the feet","[advanced] The hollow body position is the foundation of handstand pressing and gymnastics strength","[advanced] Pair with arch holds on the floor for complete spinal control in both directions"], common_mistakes:["Lower back arching off the floor — regress to dead bug immediately","Legs too high — reduces the anti-extension demand significantly","Ribcage flaring upward instead of ribs staying down"], tutorial_url:"https://www.youtube.com/watch?v=LlDNef_Ztsc", notes:"The gymnastic foundation movement." },
  hollow_body_rock: { id:"hollow_body_rock", name:"Hollow Body Rock", movement_pattern:"core", equipment_required:[], difficulty:4, class_affinity:["warrior","assassin"], muscles_primary:["transverse abdominis","rectus abdominis","hip flexors"], muscles_secondary:["lower back — anti-extension","serratus anterior"], sets_default:3, reps_min:10, reps_max:15, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:null, tempo_note:"Rock slowly and gently — the hollow position must be maintained throughout. If you lose the shape, stop and reset", regression_id:"hollow_body_hold", progression_id:null, cues:["[beginner] Start in the hollow body hold position","[beginner] Rock forward and backward gently while maintaining the same body shape","[beginner] Think of your body as a rigid banana — the shape doesn't change, only the rocking motion","[intermediate] The rocking motion should be smooth and continuous — no jerking or loss of position","[intermediate] If the lower back lifts off the floor at any point in the rock, regress to the hold","[intermediate] Full range — rock from shoulders to heels","[advanced] Add a dumbbell overhead to increase the anti-extension demand during the rock","[advanced] The dynamic nature of the rock makes it significantly harder than the static hold","[advanced] This is a direct gymnastic prerequisite movement"], common_mistakes:["Losing the hollow position during the rock and arching the lower back","Using momentum to generate the rock instead of core tension","Rocking only partially instead of full head-to-heel range"], tutorial_url:"https://www.youtube.com/watch?v=2GKDHMmkMHc", notes:"Dynamic version of the hollow hold." },
  bird_dog: { id:"bird_dog", name:"Bird-Dog", movement_pattern:"core", equipment_required:[], difficulty:2, class_affinity:["warrior","tank","mage","ranger"], muscles_primary:["erector spinae","glutes","core — anti-rotation"], muscles_secondary:["quadratus lumborum","shoulder stabilizers","hip extensors"], sets_default:3, reps_min:8, reps_max:8, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"2-3-2-0", tempo_note:"Extend one arm and the opposite leg slowly, hold for 2 seconds (3 in intermediate), bring them back in with control — don't let your hips rotate", regression_id:"dead_bug", progression_id:"bird_dog_weighted", cues:["[beginner] Start on all fours — hands under shoulders, knees under hips","[beginner] Extend one arm forward and the opposite leg back simultaneously","[beginner] Keep your hips completely level — don't let the raised leg side hike up","[intermediate] Think of a string pulling your extended hand and foot in opposite directions","[intermediate] Hips must stay square to the floor — this is the entire point of the exercise","[intermediate] Return slowly — the return is as important as the extension","[advanced] A 3-sec hold at full extension with a dumbbell in the hand is genuinely hard","[advanced] Focus on the glute of the extended leg — squeeze it hard during the hold","[advanced] Keep the supporting shoulder packed — don't let it collapse toward the ear"], common_mistakes:["Hips rotating toward the raised leg side","Extending the leg too high and arching the lower back","Rushing through reps without the hold"], tutorial_url:"https://www.youtube.com/watch?v=wiFNA3sqjCA", notes:"Primary anti-rotation and spinal stability exercise." },
  bird_dog_weighted: { id:"bird_dog_weighted", name:"Bird-Dog — Weighted", movement_pattern:"core", equipment_required:["dumbbells"], difficulty:3, class_affinity:["warrior","tank"], muscles_primary:["erector spinae","glutes","core — anti-rotation"], muscles_secondary:["quadratus lumborum","shoulder stabilizers","hip extensors"], sets_default:3, reps_min:8, reps_max:8, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"2-3-2-0", tempo_note:"Same as standard bird-dog but with a dumbbell in the extended hand — go slower and shorten the hold until the added load feels controlled", regression_id:"bird_dog", progression_id:null, cues:["[beginner] Hold a 5 kg dumbbell in the extending hand","[beginner] The weight will immediately pull your torso into rotation — resist it","[beginner] Shorten the hold if the hips rotate at all","[intermediate] The dumbbell in the hand creates a rotational pull that the obliques must resist","[intermediate] Keep the same perfect form as the unweighted version — the weight should not change your mechanics","[intermediate] Film yourself from behind to check hip level during the hold","[advanced] Dumbbell in hand plus weight strapped to ankle creates a full-body anti-rotation challenge","[advanced] This level of bird-dog is a serious core stability exercise regardless of the load used","[advanced] Pair with hollow body work in the same session for complete anterior and posterior core training"], common_mistakes:["Allowing the dumbbell to pull the torso into rotation","Compensating by reducing range of motion instead of controlling the load","Losing hip level during the weighted hold"], tutorial_url:"https://www.youtube.com/watch?v=wiFNA3sqjCA", notes:"Same tutorial as standard bird-dog." },
  side_plank: { id:"side_plank", name:"Side Plank", movement_pattern:"core", equipment_required:[], difficulty:2, class_affinity:["warrior","tank","assassin","mage","ranger"], muscles_primary:["obliques","quadratus lumborum — anti-lateral-flexion"], muscles_secondary:["gluteus medius","shoulder stabilizers","adductors"], sets_default:3, reps_min:30, reps_max:45, rep_mode:"timed", is_unilateral:true, duration_seconds:45, tempo_code:null, tempo_note:"Hold the position for as long as you can keep your hips up — drop to your knee if needed to maintain a straight body line", regression_id:null, progression_id:"side_plank_raised", cues:["[beginner] Lie on your side, elbow directly under your shoulder","[beginner] Lift your hips off the floor — body in a straight line from head to feet","[beginner] If this is too hard, bend your knees and balance on your knee instead of your feet","[intermediate] Stack feet on top of each other or stagger them for stability","[intermediate] Top arm can rest on your hip or extend toward the ceiling","[intermediate] Keep hips square — don't let the top hip rotate forward","[advanced] Add hip dips — lower hip toward floor and raise back up for 10–12 reps instead of a static hold","[advanced] Raise top leg for additional gluteus medius demand","[advanced] Left-right asymmetry in side plank duration is a direct predictor of lower back injury risk — address it"], common_mistakes:["Hips sagging toward the floor","Rotating forward so the body is no longer in a true side position","Elbow not directly under the shoulder causing unstable base"], tutorial_url:"https://www.youtube.com/watch?v=_rdfjFSFKMY", notes:"Primary anti-lateral-flexion exercise." },
  side_plank_raised: { id:"side_plank_raised", name:"Side Plank — Feet Raised", movement_pattern:"core", equipment_required:["chair"], difficulty:4, class_affinity:["warrior","assassin"], muscles_primary:["obliques","quadratus lumborum"], muscles_secondary:["gluteus medius","shoulder stabilizers"], sets_default:3, reps_min:30, reps_max:45, rep_mode:"timed", is_unilateral:true, duration_seconds:45, tempo_code:null, tempo_note:"Place feet on a chair, elbow on the floor — the elevated feet increase the lever arm significantly; expect duration to drop by 30–40% initially", regression_id:"side_plank", progression_id:null, cues:["[beginner] Master the standard side plank first — this is a significant difficulty jump","[intermediate] Place feet on a chair, elbow on the floor — the elevated feet increase the anti-lateral-flexion demand substantially","[intermediate] Everything else is identical to the standard side plank","[intermediate] Expect your duration to drop significantly at first — that's normal","[advanced] Add hip dips — lower hip toward floor and raise back up while feet remain elevated","[advanced] This is the ceiling of side plank progression with available equipment","[advanced] Symmetry between sides remains the priority even at this level"], common_mistakes:["Progressing to elevated version before standard side plank is genuinely controlled","Hips rotating forward as fatigue sets in","Elbow positioning becoming sloppy under the increased load"], tutorial_url:"https://www.youtube.com/watch?v=_rdfjFSFKMY", notes:"Ceiling of anti-lateral-flexion progression." },
  turkish_getup: { id:"turkish_getup", name:"Turkish Get-Up", movement_pattern:"core", equipment_required:["dumbbells"], difficulty:5, class_affinity:["warrior","tank","assassin"], muscles_primary:["core — all planes","shoulder stabilizers","glutes"], muscles_secondary:["hip flexors","triceps","quadriceps","thoracic rotation"], sets_default:3, reps_min:2, reps_max:3, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:null, tempo_note:"There is no tempo — each transition is as slow as needed to maintain control. Never rush a get-up", regression_id:"hollow_body_hold", progression_id:null, cues:["[beginner] Start lying on your back, dumbbell pressed overhead in one hand, same-side knee bent","[beginner] Roll to your elbow, then to your hand, then sweep the straight leg through to a lunge position, then stand","[beginner] Reverse the sequence to get back down — every step is deliberate and slow","[intermediate] Eyes on the dumbbell throughout — this keeps the shoulder packed and the wrist straight","[intermediate] The get-up has 6 distinct positions — own each one before moving to the next","[intermediate] The half-kneeling to standing transition is where most people lose shoulder position — brace before you stand","[advanced] At 5 kg this is a skill and stability exercise — the load is almost irrelevant","[advanced] Perfect get-ups build a level of full-body integration nothing else in this library replicates","[advanced] Use as a diagnostic — any breakdown in the sequence reveals a specific mobility or stability deficit worth addressing"], common_mistakes:["Rushing through transitions and losing the overhead position","Eyes leaving the dumbbell during the movement","Bending the elbow of the working arm at any point"], tutorial_url:"https://www.youtube.com/watch?v=0bWRPC49-KI", notes:"The most complex movement in the entire library." },
  // CORE — GYM
  cable_pallof_press: { id:"cable_pallof_press", name:"Cable Pallof Press", movement_pattern:"core", equipment_required:["cable_machine"], difficulty:2, class_affinity:["warrior","tank","mage","ranger"], muscles_primary:["core — anti-rotation","obliques","transverse abdominis"], muscles_secondary:["anterior deltoid","triceps","glutes"], sets_default:3, reps_min:10, reps_max:12, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"2-2-2-0", tempo_note:"Press straight out, hold for 2 seconds resisting the rotational pull, bring back in — the cable's constant pull is what makes this superior to the dumbbell version", regression_id:"pallof_pressout", progression_id:"ab_wheel_rollout", cues:["[beginner] Set cable at chest height, stand side-on to the machine, hands holding the handle at your chest","[beginner] Press the handle straight out in front of you — resist any rotation toward the cable","[beginner] The cable pulls you toward the machine the entire time — your core resists this","[intermediate] The constant rotational load from the cable is what separates this from the dumbbell version","[intermediate] Keep your feet hip-width, knees slightly bent, hips square","[intermediate] Breathe out as you press, hold at extension, breathe in as you return","[advanced] Step further from the machine to increase the rotational demand","[advanced] The standing position challenges hip stability simultaneously with core anti-rotation","[advanced] This is one of the best exercises for training the obliques in their actual function — resisting rotation, not creating it"], common_mistakes:["Rotating toward the cable during the press — the entire point is to resist this","Standing too close to the machine and reducing the anti-rotation demand","Using a weight that causes compensatory stance shifts"], tutorial_url:"https://www.youtube.com/watch?v=AH_QZLm_0-s", notes:"The cable provides constant tension that the dumbbell version can't replicate." },
  ab_wheel_rollout: { id:"ab_wheel_rollout", name:"Ab Wheel Rollout", movement_pattern:"core", equipment_required:["cable_machine"], difficulty:4, class_affinity:["warrior","assassin","tank"], muscles_primary:["core — anti-extension","transverse abdominis","rectus abdominis"], muscles_secondary:["latissimus dorsi","shoulder stabilizers","hip flexors"], sets_default:3, reps_min:8, reps_max:10, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-1-2-0", tempo_note:"Roll out slowly for 3 seconds, hold for 1 second at the extended position, roll back in for 2 seconds — lower back must stay neutral throughout", regression_id:"hollow_body_hold", progression_id:null, cues:["[beginner] Start from your knees — full rollouts from standing are for later","[beginner] Roll forward only as far as you can while keeping your lower back neutral — this is much less than you think","[beginner] Pull yourself back in by engaging your core, not by using your arms to push","[intermediate] The limiting factor is anti-extension core strength — your lower back will want to hyperextend as you roll out","[intermediate] Think about the hollow body position — ribs down, slight posterior pelvic tilt — throughout the roll","[intermediate] From knees, a full rollout means your arms are almost fully extended in front of you","[advanced] Full rollout from standing is an elite core strength expression","[advanced] The eccentric (rolling out) is the primary stimulus — control it completely","[advanced] If the lower back sags or hyperextends at any point, that's your stopping distance — not the floor"], common_mistakes:["Rolling out further than core strength allows and compensating with lower back extension — injury risk","Using the arms to push back instead of the core to pull back","Going too fast and losing the anti-extension position"], tutorial_url:"https://www.youtube.com/watch?v=Xyd_fa5zoEU", notes:"One of the most effective anti-extension core exercises available. Start from knees." },

  // ROTATION
  thoracic_rotation_quadruped: { id:"thoracic_rotation_quadruped", name:"Thoracic Rotation — Quadruped", movement_pattern:"rotation", equipment_required:[], difficulty:1, class_affinity:["warrior","tank","assassin","mage","ranger"], muscles_primary:["thoracic extensors","rotator cuff","obliques"], muscles_secondary:["rhomboids","serratus anterior","cervical stabilizers"], sets_default:3, reps_min:10, reps_max:10, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"2-2-2-0", tempo_note:"Place one hand behind your head, rotate your elbow toward the ceiling slowly — follow it with your eyes. Hold for 2 seconds at the top", regression_id:null, progression_id:"side_lying_rotation", cues:["[beginner] Start on all fours — hands under shoulders, knees under hips","[beginner] Place one hand behind your head, elbow pointing out to the side","[beginner] Rotate that elbow up toward the ceiling as far as comfortable, hold briefly, return","[intermediate] The rotation should come entirely from the thoracic spine — above the lower back","[intermediate] Lock the lower back by keeping your hips completely still throughout","[intermediate] Exhale as you rotate up — the exhale releases the ribcage and allows more range","[advanced] Maximum range is where your elbow points directly at the ceiling","[advanced] Any hip movement means lumbar spine is compensating — reduce range and own the thoracic rotation first","[advanced] Left-right asymmetry in range is common and worth noting — the stiffer side needs more attention"], common_mistakes:["Hips rotating instead of thoracic spine — this means the lumbar spine is doing the work","Not following the elbow with the eyes — the cervical spine should rotate with the thoracic","Rushing through reps without the hold at the top"], tutorial_url:"https://www.youtube.com/watch?v=kF_wMJUQnmU", notes:"Non-negotiable prerequisite for all loaded rotation work." },
  side_lying_rotation: { id:"side_lying_rotation", name:"Side-Lying Thoracic Rotation", movement_pattern:"rotation", equipment_required:[], difficulty:2, class_affinity:["warrior","tank","mage","ranger"], muscles_primary:["thoracic extensors","obliques","rotator cuff"], muscles_secondary:["pectoralis major — stretched","rhomboids","serratus anterior"], sets_default:3, reps_min:10, reps_max:10, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"2-3-2-0", tempo_note:"Lie on your side with knees stacked and bent, top arm sweeps open toward the floor behind you slowly — let gravity do some of the work", regression_id:"thoracic_rotation_quadruped", progression_id:"rotation_standing_dumbbell", cues:["[beginner] Lie on your side, hips and knees bent at 90 degrees, knees stacked on top of each other","[beginner] Both arms extended in front of you at shoulder height","[beginner] Sweep the top arm slowly in an arc overhead and toward the floor behind you — follow it with your eyes and head","[intermediate] Keep the knees stacked and still — they want to fall apart as the upper body rotates","[intermediate] The goal is for the back of your top hand to touch the floor behind you","[intermediate] Breathe into the rotation — inhale as you open, hold at end range, exhale as you return","[advanced] If your knees separate during the movement, place a foam roller or rolled towel between them","[advanced] End range hold is where the thoracic capsule actually changes — don't skip it","[advanced] Both sides should reach similar range — address the stiffer side with extra volume"], common_mistakes:["Knees separating and hips rotating to allow more apparent range of motion","Not holding at end range — the movement loses most of its value without the hold","Moving too fast and using momentum instead of true thoracic mobility"], tutorial_url:"https://www.youtube.com/watch?v=LqPNGJiV8_8", notes:"Better thoracic rotation stimulus than the quadruped version." },
  rotation_standing_dumbbell: { id:"rotation_standing_dumbbell", name:"Standing Rotation — Dumbbell", movement_pattern:"rotation", equipment_required:["dumbbells"], difficulty:2, class_affinity:["warrior","tank","assassin","ranger"], muscles_primary:["obliques","thoracic rotators","hip rotators"], muscles_secondary:["glutes","anterior deltoid","core"], sets_default:3, reps_min:10, reps_max:10, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"2-1-2-0", tempo_note:"Hold the dumbbell with both hands, rotate your torso to one side slowly — let your back heel lift naturally. Return to center with control", regression_id:"side_lying_rotation", progression_id:"rotation_dumbbell_chop", cues:["[beginner] Stand with feet hip-width apart, hold one dumbbell with both hands at chest height","[beginner] Rotate your entire torso to one side — shoulders, chest, and the dumbbell all move together","[beginner] Let your back heel rise naturally as you rotate — this allows full hip and thoracic rotation","[intermediate] The rotation should come from the hips and thoracic spine together — not just the arms swinging","[intermediate] Keep the dumbbell at the same height throughout — don't let it drop as you rotate","[intermediate] The return to center is active — don't unwind passively","[advanced] Think of throwing a punch in slow motion — the power comes from the hip drive and thoracic rotation, not the arms","[advanced] Decelerate the return actively — this eccentric oblique load is the primary training stimulus","[advanced] Progress to the chop pattern when this feels completely controlled"], common_mistakes:["Rotating only the arms and shoulders while the hips stay square","Back heel staying fixed — limits thoracic and hip rotation range","Unwinding passively on the return instead of controlling the deceleration"], tutorial_url:"https://www.youtube.com/watch?v=0M8TlbLsHJY", notes:"First loaded rotation exercise." },
  rotation_dumbbell_chop: { id:"rotation_dumbbell_chop", name:"Dumbbell Chop", movement_pattern:"rotation", equipment_required:["dumbbells"], difficulty:3, class_affinity:["warrior","assassin","ranger"], muscles_primary:["obliques","thoracic rotators","hip rotators","anterior deltoid"], muscles_secondary:["glutes","core — anti-rotation on deceleration","latissimus dorsi"], sets_default:3, reps_min:8, reps_max:8, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"2-1-2-0", tempo_note:"Hold the dumbbell with both hands, bring it from high on one side down to the opposite hip diagonally — like chopping wood. Control the return", regression_id:"rotation_standing_dumbbell", progression_id:null, cues:["[beginner] Hold one dumbbell with both hands above one shoulder","[beginner] Chop diagonally down and across your body toward the opposite hip","[beginner] Let your back heel rise and hips rotate — this is a full body rotation pattern","[intermediate] The power comes from the hips rotating — the arms just hold the dumbbell","[intermediate] Think of the pattern as a diagonal hip drive, not an arm swing","[intermediate] Control the return — don't let the dumbbell pull you back passively","[advanced] The deceleration at the bottom is the primary oblique stimulus — actively brake the movement","[advanced] Low-to-high chop is the reverse pattern — alternate between high-to-low and low-to-high across sessions","[advanced] At 5 kg this is a skill and conditioning tool — intent and control are the variables, not load"], common_mistakes:["Arms doing all the work while hips stay square","Losing control at the bottom of the chop — passive deceleration loses the training stimulus","Chopping straight down instead of on a true diagonal"], tutorial_url:"https://www.youtube.com/watch?v=pAplQXk3dkU", notes:"Diagonal chop pattern trains the oblique sling system." },
  pallof_press_rotation: { id:"pallof_press_rotation", name:"Pallof Press with Rotation", movement_pattern:"rotation", equipment_required:["dumbbells"], difficulty:3, class_affinity:["warrior","tank","ranger"], muscles_primary:["obliques","transverse abdominis","thoracic rotators"], muscles_secondary:["anterior deltoid","triceps","quadratus lumborum"], sets_default:3, reps_min:8, reps_max:8, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"2-2-2-0", tempo_note:"Press the dumbbell out, hold for 2 seconds resisting rotation, then slowly rotate toward your hip and back — two separate phases, don't rush either", regression_id:"pallof_pressout", progression_id:null, cues:["[beginner] Half-kneeling position, hold a 5 kg dumbbell at your chest with both hands","[beginner] Press the dumbbell straight out and resist any torso rotation — this is the anti-rotation phase","[beginner] Then rotate the dumbbell slowly toward your hip and back — this is the controlled rotation phase","[intermediate] The two phases train opposing qualities — first resist rotation, then produce it","[intermediate] Keep hips square during the press phase — only the upper body rotates in the rotation phase","[intermediate] Exhale into the rotation to access more range","[advanced] The rotation phase should be slow and controlled — the obliques are decelerating the movement","[advanced] Standing position increases the hip stability demand compared to half-kneeling","[advanced] This exercise sits at the intersection of anti-rotation and rotation training — it trains both in a single movement"], common_mistakes:["Rotating during the press phase — the press should be completely anti-rotational","Rushing the rotation phase and losing oblique control","Hips rotating along with the upper body during the rotation phase"], tutorial_url:"https://www.youtube.com/watch?v=AH_QZLm_0-s", notes:"The most complete single rotation exercise in the library." },
  // CARDIO

function userCanPerform(exercise, userEquipment) {
  if (!exercise.equipment_required || exercise.equipment_required.length === 0) return true;
  return exercise.equipment_required.every(item => userEquipment.includes(item));
}

function exerciseMatchesClassAffinity(exercise, userClass) {
  const classDef = CLASS_DEFINITIONS[userClass];
  if (!classDef) return false;
  if (classDef.affinity_required) {
    return exercise.class_affinity && exercise.class_affinity.includes(userClass);
  }
  if (!exercise.class_affinity || exercise.class_affinity.length === 0) return true;
  return exercise.class_affinity.includes(userClass);
}

function filterCuesByExperience(cues, experience) {
  if (!cues) return [];
  return cues
    .filter(cue => cue.startsWith(`[${experience}]`))
    .map(cue => cue.replace(`[${experience}] `, ""));
}

function getRandomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function getUnderrepresentedPattern(sessionHistory, userClass) {
  const classDef = CLASS_DEFINITIONS[userClass];
  const recentPatterns = sessionHistory.slice(-7).flatMap(s => s.patterns_used || []);
  const patternCounts = {};
  classDef.preferred_patterns.forEach(p => { patternCounts[p] = recentPatterns.filter(r => r === p).length; });
  let mostNeeded = null;
  let lowestScore = Infinity;
  classDef.preferred_patterns.forEach((pattern, i) => {
    const weight = classDef.pattern_weights[i];
    const count = patternCounts[pattern] || 0;
    const score = count / weight;
    if (score < lowestScore) { lowestScore = score; mostNeeded = pattern; }
  });
  return mostNeeded;
}

function isDeloadWeek(weekNumber, trainingDays) {
  const deloadFrequency = { 3: 6, 4: 5, 5: 4, 6: 3, 7: 2 };
  const freq = deloadFrequency[trainingDays] || 5;
  return weekNumber % freq === 0;
}

function getMilestone(streakDays, hasFirstProgressionHappenedBefore, firstProgressionTriggeredThisSession) {
  if (!hasFirstProgressionHappenedBefore && firstProgressionTriggeredThisSession) {
    return SYSTEM_VOICE.milestones.first_progression;
  }
  const map = { 3: SYSTEM_VOICE.milestones.streak_3, 7: SYSTEM_VOICE.milestones.streak_7, 14: SYSTEM_VOICE.milestones.streak_14, 30: SYSTEM_VOICE.milestones.streak_30 };
  return map[streakDays] || null;
}

function getRotationExercise(pattern, currentDifficulty, userClass, userEquipment, exerciseLibrary, excludeId) {
  const candidates = Object.values(exerciseLibrary).filter(ex =>
    ex.movement_pattern === pattern && ex.id !== excludeId &&
    Math.abs(ex.difficulty - currentDifficulty) <= 1 &&
    userCanPerform(ex, userEquipment) &&
    exerciseMatchesClassAffinity(ex, userClass)
  );
  if (candidates.length === 0) return null;
  return getRandomItem(candidates);
}

function adaptExercise(assignedExercise, performance, rating, userClass, exerciseLibrary, userEquipment, deload = false, volumeScale = 1.0) {
  const classDef = CLASS_DEFINITIONS[userClass];
  const scaleSets = (s) => Math.max(2, Math.round(s * volumeScale));
  const speed = classDef.progression_speed;
  const repMode = assignedExercise.rep_mode || "reps";
  const isTimed = repMode === "timed";
  const isDistance = repMode === "distance";
  // interval type is treated as timed internally, just with a special display note later
  const isInterval = repMode === "interval";
  const effectiveMode = isInterval ? "timed" : repMode;

  let metricAchieved, metricMin, metricMax;
  if (effectiveMode === "timed") {
    metricAchieved = performance.duration_achieved ?? assignedExercise.duration_seconds;
    metricMin = assignedExercise.duration_seconds;
    metricMax = assignedExercise.duration_seconds;
  } else if (effectiveMode === "distance") {
    metricAchieved = performance.distance_achieved ?? assignedExercise.reps_max;
    metricMin = assignedExercise.reps_min;
    metricMax = assignedExercise.reps_max;
  } else {
    metricAchieved = performance.reps_achieved ?? assignedExercise.reps_max;
    metricMin = assignedExercise.reps_min;
    metricMax = assignedExercise.reps_max;
  }

  if (deload) {
    const sets = scaleSets(Math.max(2, assignedExercise.sets_default - 1));
    const out = { exercise: assignedExercise, sets, rpe_target: 5, adaptationMessage: null };
    if (effectiveMode === "timed") { out.duration_seconds = assignedExercise.duration_seconds; }
    else if (effectiveMode === "distance") { out.reps_min = metricMin; out.reps_max = metricMin; }
    else { out.reps_min = metricMin; out.reps_max = metricMin; }
    return out;
  }

  if (rating <= 2) {
    const atMax = metricAchieved >= metricMax;
    const canIncreaseMetric = !atMax || speed === "slow";
    if (canIncreaseMetric) {
      if (effectiveMode === "timed") {
        const inc = rating === 1 ? 10 : 5;
        const newDuration = Math.min(metricMax + inc, metricMax + 60);
        return { exercise: assignedExercise, sets: assignedExercise.sets_default + classDef.bonus_sets, duration_seconds: newDuration, reps_min: null, reps_max: null, rep_mode: repMode, is_unilateral: assignedExercise.is_unilateral, rpe_target: 8, adaptationMessage: SYSTEM_VOICE.adaptation.timed_progressed(assignedExercise.name, newDuration) };
      } else if (effectiveMode === "distance") {
        const inc = rating === 1 ? 200 : 100;
        const newDist = Math.min(metricMax + inc, metricMax + 1000);
        return { exercise: assignedExercise, sets: scaleSets(assignedExercise.sets_default + classDef.bonus_sets), reps_min: newDist, reps_max: newDist, rep_mode: "distance", is_unilateral: assignedExercise.is_unilateral, rpe_target: 8, adaptationMessage: SYSTEM_VOICE.adaptation.distance_increased(assignedExercise.name, newDist) };
      } else {
        const inc = rating === 1 ? 2 : 1;
        const newMax = Math.min(metricMax + inc, metricMax + 3);
        const newMin = metricMin + inc;
        return { exercise: assignedExercise, sets: scaleSets(assignedExercise.sets_default + classDef.bonus_sets), reps_min: newMin, reps_max: newMax, rep_mode: "reps", is_unilateral: assignedExercise.is_unilateral, rpe_target: 8, adaptationMessage: SYSTEM_VOICE.adaptation.reps_increased(assignedExercise.name, newMax) };
      }
    }
    const progId = assignedExercise.progression_id;
    if (progId && exerciseLibrary[progId]) {
      const nextEx = exerciseLibrary[progId];
      if (nextEx.difficulty <= classDef.max_difficulty && userCanPerform(nextEx, userEquipment) && exerciseMatchesClassAffinity(nextEx, userClass)) {
        return { exercise: nextEx, sets: scaleSets(nextEx.sets_default + classDef.bonus_sets), reps_min: nextEx.reps_min, reps_max: nextEx.reps_max, duration_seconds: nextEx.duration_seconds, rep_mode: nextEx.rep_mode, is_unilateral: nextEx.is_unilateral, rpe_target: 8, adaptationMessage: SYSTEM_VOICE.adaptation.progressed_exercise(assignedExercise.name, nextEx.name) };
      }
    }
    const newSets = scaleSets(Math.min(assignedExercise.sets_default + 1, 6));
    return { exercise: assignedExercise, sets: newSets, reps_min: assignedExercise.reps_min, reps_max: assignedExercise.reps_max, duration_seconds: assignedExercise.duration_seconds, rep_mode: assignedExercise.rep_mode, is_unilateral: assignedExercise.is_unilateral, rpe_target: 8, adaptationMessage: SYSTEM_VOICE.adaptation.max_reached(assignedExercise.name) };
  }

  if (rating === 3) {
    let newMetricMax = metricMax;
    if (metricAchieved >= metricMax - 1) {
      if (effectiveMode === "timed") newMetricMax = metricMax + 5;
      else if (effectiveMode === "distance") newMetricMax = metricMax + 100;
      else newMetricMax = Math.min(metricMax + 1, metricMax + 2);
    }
    const out = { exercise: assignedExercise, sets: scaleSets(assignedExercise.sets_default + classDef.bonus_sets), rpe_target: 7, adaptationMessage: null };
    if (effectiveMode === "timed") out.duration_seconds = newMetricMax;
    else if (effectiveMode === "distance") { out.reps_min = metricMin; out.reps_max = newMetricMax; }
    else { out.reps_min = metricMin; out.reps_max = newMetricMax; }
    return out;
  }

  if (rating >= 4) {
    if (rating === 4) {
      const newSets = scaleSets(Math.max(2, assignedExercise.sets_default - 1));
      const out = { exercise: assignedExercise, sets: newSets, rpe_target: 6, adaptationMessage: null };
      if (effectiveMode === "timed") {
        const dur = Math.max(metricMin, metricMax - 10);
        out.duration_seconds = dur;
        out.adaptationMessage = SYSTEM_VOICE.adaptation.timed_regressed(assignedExercise.name, dur);
      } else if (effectiveMode === "distance") {
        const dist = Math.max(metricMin, metricMax - 200);
        out.reps_min = metricMin; out.reps_max = dist;
        out.adaptationMessage = SYSTEM_VOICE.adaptation.distance_decreased(assignedExercise.name, dist);
      } else {
        const newMax = Math.max(metricMin, metricMax - 2);
        out.reps_min = metricMin; out.reps_max = newMax;
        out.adaptationMessage = SYSTEM_VOICE.adaptation.reps_decreased(assignedExercise.name, newMax);
      }
      return out;
    }
    const regId = assignedExercise.regression_id;
    if (regId && exerciseLibrary[regId]) {
      const prevEx = exerciseLibrary[regId];
      if (userCanPerform(prevEx, userEquipment) && exerciseMatchesClassAffinity(prevEx, userClass)) {
        return { exercise: prevEx, sets: scaleSets(prevEx.sets_default + classDef.bonus_sets), reps_min: prevEx.reps_min, reps_max: prevEx.reps_max, duration_seconds: prevEx.duration_seconds, rep_mode: prevEx.rep_mode, is_unilateral: prevEx.is_unilateral, rpe_target: 6, adaptationMessage: SYSTEM_VOICE.adaptation.regressed_exercise(assignedExercise.name, prevEx.name) };
      }
    }
    const newSets = scaleSets(2);
    if (effectiveMode === "timed") {
      const dur = metricMin;
      return { exercise: assignedExercise, sets: newSets, duration_seconds: dur, rpe_target: 5, adaptationMessage: SYSTEM_VOICE.adaptation.timed_regressed(assignedExercise.name, dur) };
    } else if (effectiveMode === "distance") {
      const dist = metricMin;
      return { exercise: assignedExercise, sets: newSets, reps_min: dist, reps_max: dist, rpe_target: 5, adaptationMessage: SYSTEM_VOICE.adaptation.distance_decreased(assignedExercise.name, dist) };
    } else {
      const newMax = metricMin + 1;
      return { exercise: assignedExercise, sets: newSets, reps_min: metricMin, reps_max: newMax, rpe_target: 5, adaptationMessage: SYSTEM_VOICE.adaptation.reps_decreased(assignedExercise.name, newMax) };
    }
  }
}

function buildInitialSession(userProfile, exerciseLibrary) {
  const { class: userClass, equipment, experience } = userProfile;
  const classDef = CLASS_DEFINITIONS[userClass];
  const difficultyGate = { beginner: 3, intermediate: 4, advanced: 5 };
  const maxDifficulty = Math.min(classDef.max_difficulty, difficultyGate[experience] || 3);
  const pool = Object.values(exerciseLibrary).filter(ex =>
    userCanPerform(ex, equipment) && exerciseMatchesClassAffinity(ex, userClass) && ex.difficulty <= maxDifficulty
  );
  const byPattern = {};
  classDef.preferred_patterns.forEach(p => { byPattern[p] = []; });
  pool.forEach(ex => { if (byPattern[ex.movement_pattern]) byPattern[ex.movement_pattern].push(ex); });
  const maxSamePattern = { beginner: 1, intermediate: 2, advanced: 3 };
  const patternCap = maxSamePattern[experience] || 1;
  const selected = [];
  classDef.preferred_patterns.forEach((pattern, i) => {
    const exercises = byPattern[pattern];
    if (!exercises || exercises.length === 0) return;
    exercises.sort((a, b) => a.difficulty - b.difficulty);
    const count = Math.min(classDef.pattern_weights[i] >= 3 ? 2 : 1, patternCap);
    for (let j = 0; j < count && j < exercises.length; j++) {
      if (!selected.find(se => se.id === exercises[j].id)) selected.push(exercises[j]);
    }
  });
  if (selected.length < 4) {
    const remaining = pool.filter(ex => !selected.find(se => se.id === ex.id));
    remaining.sort((a, b) => a.difficulty - b.difficulty);
    for (const ex of remaining) { if (selected.length >= 5) break; selected.push(ex); }
  }
  const volumeScales = { 3: 1.2, 4: 1.0, 5: 0.85, 6: 0.7, 7: 0.6 };
  const frequencyScale = volumeScales[userProfile.trainingDays] || 1.0;
  const experienceScales = { beginner: 0.7, intermediate: 1.0, advanced: 1.2 };
  const experienceScale = experienceScales[experience] || 1.0;
  const volumeScale = frequencyScale * experienceScale;
  const exercises = selected.map(ex => {
    const obj = {
      exercise_id: ex.id, name: ex.name, sets: Math.max(2, Math.round((ex.sets_default + (classDef.bonus_sets || 0)) * volumeScale)),
      rep_mode: ex.rep_mode || "reps", is_unilateral: ex.is_unilateral || false,
      tempo_code: ex.tempo_code || null, tempo_note: ex.tempo_note || null,
      cues: filterCuesByExperience(ex.cues, experience),
      tutorial_url: ex.tutorial_url || null, rpe_target: null,
      actual_sets_completed: null, actual_reps_achieved: null,
      actual_duration_achieved: null, actual_distance_achieved: null,
    };
    if (ex.rep_mode === "timed" || ex.rep_mode === "interval") {
      const maxCardio = { beginner: 1200, intermediate: 2400, advanced: 3600 };
      const cardioCap = ex.movement_pattern === "cardio" ? (maxCardio[experience] || 1200) : Infinity;
      obj.duration_seconds = Math.min(ex.duration_seconds, cardioCap);
    } else if (ex.rep_mode === "distance") {
      obj.reps_min = ex.reps_min; obj.reps_max = ex.reps_max;
    } else {
      obj.reps_min = ex.reps_min; obj.reps_max = ex.reps_max;
    }
    return obj;
  });
  return { date: new Date().toISOString().split("T")[0], week_number: 1, is_deload: false, exercises, patterns_used: [...new Set(selected.map(ex => ex.movement_pattern))], priority_pattern_gap: null };
}

function buildTodaySession({ userProfile, yesterdaySession, sessionHistory, exerciseLibrary, weekNumber, streakDays }) {
  const trainingDays = userProfile.trainingDays || 4;
  const today = new Date().getDay(); // 0=Sun, 1=Mon, ... 6=Sat
  // Build active days symmetrically around the week
  const daySchedules = {
    3: [1, 3, 5],           // Mon, Wed, Fri
    4: [1, 2, 4, 5],        // Mon, Tue, Thu, Fri
    5: [1, 2, 3, 4, 5],     // Mon–Fri
    6: [1, 2, 3, 4, 5, 6],  // Mon–Sat
    7: [0, 1, 2, 3, 4, 5, 6]
  };
  const activeDays = daySchedules[trainingDays] || daySchedules[4];
  const isScheduledRestDay = !activeDays.includes(today);
  const userClass = userProfile.class;
  const userEquipment = userProfile.equipment;
  const userExperience = userProfile.experience;
  const hasFirstProgressionHappenedBefore = userProfile.hasFirstProgressionHappened || false;
  const deload = isDeloadWeek(weekNumber, userProfile.trainingDays);
  const volumeScales = { 3: 1.2, 4: 1.0, 5: 0.85, 6: 0.7, 7: 0.6 };
  const frequencyScale = volumeScales[userProfile.trainingDays] || 1.0;
  const experienceScales = { beginner: 0.7, intermediate: 1.0, advanced: 1.2 };
  const experienceScale = experienceScales[userExperience] || 1.0;
  const volumeScale = frequencyScale * experienceScale;
  const rating = yesterdaySession?.rating ?? 3;
  const isFirstSession = !yesterdaySession;

  if (isFirstSession) {
    const initialSession = buildInitialSession(userProfile, exerciseLibrary);
    return { session: initialSession, voiceMessage: SYSTEM_VOICE.session_open.first_ever, meta: { firstProgressionOccurred: false } };
  }

  if (isScheduledRestDay) {
    return { session: null, voiceMessage: SYSTEM_VOICE.session_open.scheduled_rest, meta: { firstProgressionOccurred: false } };
  }

  const priorityPattern = getUnderrepresentedPattern(sessionHistory, userClass);
  const adaptedExercises = [];
  const adaptationMessages = [];
  let firstProgressionOccurredThisSession = false;

  if (yesterdaySession.exercises) {
    for (const assignment of yesterdaySession.exercises) {
      let exercise = exerciseLibrary[assignment.exercise_id];
      if (!exercise) continue;
      const performance = {
        sets_completed: assignment.actual_sets_completed ?? assignment.sets,
        reps_achieved: assignment.actual_reps_achieved ?? (assignment.reps_max || 0),
        duration_achieved: assignment.actual_duration_achieved ?? (assignment.duration_seconds || 0),
        distance_achieved: assignment.actual_distance_achieved ?? (assignment.reps_max || 0),
      };
      let adapted = adaptExercise(exercise, performance, rating, userClass, exerciseLibrary, userEquipment, deload, volumeScale);

      const isProgression = adapted.exercise.id !== exercise.id ||
        (adapted.reps_max && adapted.reps_max > (exercise.reps_max || 0)) ||
        (adapted.duration_seconds && adapted.duration_seconds > (exercise.duration_seconds || 0)) ||
        (adapted.reps_max && exercise.rep_mode === "distance" && adapted.reps_max > (exercise.reps_max || 0));
      if (isProgression && !hasFirstProgressionHappenedBefore) firstProgressionOccurredThisSession = true;

      if (!deload && rating === 3 && adapted.exercise.id === exercise.id) {
        const rotationEx = getRotationExercise(exercise.movement_pattern, exercise.difficulty, userClass, userEquipment, exerciseLibrary, exercise.id);
        if (rotationEx) {
          adapted = { ...adapted, exercise: rotationEx, sets: rotationEx.sets_default + (CLASS_DEFINITIONS[userClass].bonus_sets || 0),
            reps_min: rotationEx.reps_min, reps_max: rotationEx.reps_max,
            duration_seconds: rotationEx.duration_seconds, rep_mode: rotationEx.rep_mode,
            is_unilateral: rotationEx.is_unilateral,
            adaptationMessage: SYSTEM_VOICE.adaptation.exercise_rotated(exercise.name, rotationEx.name) };
        }
      }

      if (adapted.adaptationMessage) adaptationMessages.push(adapted.adaptationMessage);

      const finalExercise = {
        exercise_id: adapted.exercise.id, name: adapted.exercise.name,
        sets: adapted.sets, rep_mode: adapted.rep_mode || adapted.exercise.rep_mode,
        is_unilateral: adapted.is_unilateral || adapted.exercise.is_unilateral,
        tempo_code: adapted.exercise.tempo_code || null,
        tempo_note: adapted.exercise.tempo_note || null,
        cues: filterCuesByExperience(adapted.exercise.cues, userExperience),
        tutorial_url: adapted.exercise.tutorial_url || null,
        rpe_target: adapted.rpe_target || null,
        actual_sets_completed: null, actual_reps_achieved: null,
        actual_duration_achieved: null, actual_distance_achieved: null,
      };
      if (adapted.rep_mode === "timed" || adapted.rep_mode === "interval") {
        const maxCardio = { beginner: 1200, intermediate: 2400, advanced: 3600 };
        const cardioCap = exerciseLibrary[adapted.exercise.id]?.movement_pattern === "cardio"
          ? (maxCardio[userExperience] || 1200) : Infinity;
        finalExercise.duration_seconds = Math.min(adapted.duration_seconds, cardioCap);
      } else if (adapted.rep_mode === "distance") {
        finalExercise.reps_min = adapted.reps_min; finalExercise.reps_max = adapted.reps_max;
      } else {
        finalExercise.reps_min = adapted.reps_min; finalExercise.reps_max = adapted.reps_max;
      }
      adaptedExercises.push(finalExercise);
    }
  }

  const todaysPatterns = adaptedExercises.map(e => exerciseLibrary[e.exercise_id]?.movement_pattern);
  const patternGap = priorityPattern && !todaysPatterns.includes(priorityPattern);
  if (patternGap) adaptationMessages.push(SYSTEM_VOICE.adaptation.pattern_gap(priorityPattern));

  const milestoneMessage = getMilestone(streakDays, hasFirstProgressionHappenedBefore, firstProgressionOccurredThisSession);

  let openingVoice = SYSTEM_VOICE.session_open.returning;
  if (yesterdaySession?.wasRestDay) openingVoice = SYSTEM_VOICE.session_open.after_rest_day;
  else if (deload) openingVoice = SYSTEM_VOICE.session_open.deload_week;

  const voiceParts = [openingVoice];
  if (adaptationMessages.length > 0) voiceParts.push(adaptationMessages.join(" "));
  if (milestoneMessage) voiceParts.push(milestoneMessage);
  const finalVoice = voiceParts.join(" ");

  return {
    session: {
      date: new Date().toISOString().split("T")[0],
      week_number: weekNumber,
      is_deload: deload,
      exercises: adaptedExercises,
      patterns_used: [...new Set(todaysPatterns)],
      priority_pattern_gap: patternGap ? priorityPattern : null,
      rating: null,
    },
    voiceMessage: finalVoice,
    meta: { firstProgressionOccurred: firstProgressionOccurredThisSession },
  };
}

// 3. PERSISTENCE (localStorage)
// ============================================================
function loadData() {
  const raw = localStorage.getItem('GymLevelingData');
  if (!raw) return null;
  try { return JSON.parse(raw); } catch (e) { return null; }
}
function saveData(data) { localStorage.setItem('GymLevelingData', JSON.stringify(data)); }
function getAppData() {
  let data = loadData();
  if (!data) data = { userProfile: null, history: [], streak: 0, week: 1, hasFirstProgressionHappened: false };
  return data;
}
function saveAppData(appData) { saveData(appData); }

// ============================================================
// 4. EXPORT / IMPORT / RESET
// ============================================================
function exportData() {
  const data = localStorage.getItem('GymLevelingData');
  if (!data) { alert('No data to export.'); return; }
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Gym_leveling_backup_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.userProfile && !data.history) { alert('Invalid backup file.'); return; }
      localStorage.setItem('GymLevelingData', JSON.stringify(data));
      alert('✅ Data imported! Reloading...');
      location.reload();
    } catch (err) { alert('❌ Import failed: ' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}
function resetAllData() {
  if (!confirm('⚠️ Delete ALL progress (profile, history, streak)?')) return;
  if (!confirm('Really? No undo.')) return;
  localStorage.removeItem('GymLevelingData');
  alert('Data cleared. Reloading...');
  location.reload();
}

  // Pattern frequency
  const patternCounts = {};
  history.filter(s => !s.wasRestDay).forEach(s => {
    (s.patterns_used || []).forEach(p => { patternCounts[p] = (patternCounts[p] || 0) + 1; });
  });

  // Recent 20 sessions
  const recent = [...history].reverse().slice(0, 20);

  const patternRows = Object.entries(patternCounts)
    .sort((a,b) => b[1]-a[1])
    .map(([p,c]) => `

      }
      return `<li>▸ ${e.name}<span>${e.sets ? e.sets+'×' : ''} ${metric}</span></li>`;
    }).join('');
    return `
      <div class="history-entry">
        <div class="history-entry-header">
          <span class="history-entry-date">${s.date || '—'} · WEEK ${s.week_number || '?'}</span>
          <span class="history-entry-rating ${ratingClass}">${ratingLabel}</span>

          <div class="stat-label">Class</div>

    </div>
    <div class="card">
      <div class="card-title">PATTERN FREQUENCY</div>
      ${patternRows || '<p style="color:var(--text-muted);font-size:0.85rem;">No sessions recorded yet.</p>'}
    </div>
    <div class="card">
      <div class="card-title">TRIAL LOG <span class="badge">LAST 20</span></div>
      ${historyRows || '<p style="color:var(--text-muted);font-size:0.85rem;">No sessions recorded yet.</p>'}
    </div>
    <a href="YOUR_GOOGLE_FORM_LINK" target="_blank" style="display:block;text-align:center;padding:16px;font-size:0.75rem;color:#45a29e;opacity:0.6;text-decoration:none;font-family:monospace;letter-spacing:2px;">[ SUBMIT FEEDBACK TO THE SYSTEM ]</a>

  const dw = document.getElementById('dumbbell-weight');

    equipment.push(`dumbbells_${parseFloat(dw.value) || 10}kg`);

  const bw = document.getElementById('backpack-weight');
  if (bw && document.querySelector('.equip-checkbox[value="backpack"]').checked) {

    equipment = equipment.filter(e => e !== 'gym');
    ['dumbbells', 'chair', 'pull_up_bar', 'backpack', 'barbell', 'cable_machine'].forEach(item => {
      if (!equipment.includes(item)) equipment.push(item);

  const exp = document.getElementById('exp-select').value;
