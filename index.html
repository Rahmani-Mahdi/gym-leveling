<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Leveling – Offline</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#45a29e">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-body: #080b12;
      --bg-card: rgba(20, 30, 45, 0.85);
      --border-glow: rgba(69, 162, 158, 0.25);
      --accent: #45a29e;
      --accent-bright: #66fcf1;
      --text-primary: #e5e9f0;
      --text-secondary: #a0b3c9;
      --text-muted: #6a7f9a;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      --radius: 16px;
      --radius-sm: 8px;
    }
    body {
      background: var(--bg-body);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      background-image: radial-gradient(circle at 20% 20%, rgba(69, 162, 158, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(102, 252, 241, 0.03) 0%, transparent 50%);
    }
    #app { max-width: 820px; width: 100%; margin: 0 auto; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      padding: 20px 0 24px 0;
      border-bottom: 1px solid var(--border-glow);
      margin-bottom: 30px;
    }
    .header-left h1 {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent-bright), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-left .subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      -webkit-text-fill-color: var(--text-muted);
    }
    .header-right {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .streak-badge {
      background: rgba(69, 162, 158, 0.15);
      border: 1px solid var(--accent);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent-bright);
      white-space: nowrap;
    }
    .week-badge {
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .toolbar {
      display: flex;
      gap: 6px;
      margin-left: 5px;
      flex-wrap: wrap;
    }
    .btn-icon {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .btn-icon:hover {
      background: rgba(69, 162, 158, 0.15);
      border-color: var(--accent);
      color: var(--text-primary);
    }
    .btn-icon.danger:hover {
      background: rgba(192, 57, 43, 0.2);
      border-color: #c0392b;
      color: #e74c3c;
    }

    .card {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border-glow);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      transition: border-color 0.3s ease;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-title .badge {
      background: var(--accent);
      color: #080b12;
      font-size: 0.6rem;
      font-weight: 800;
      padding: 2px 10px;
      border-radius: 40px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .voice-box {
      background: rgba(69, 162, 158, 0.05);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      margin-bottom: 24px;
      font-style: italic;
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      box-shadow: inset 0 0 20px rgba(69, 162, 158, 0.02);
    }
    .voice-box strong {
      color: var(--accent-bright);
      font-style: normal;
    }
    .cue-line {
      font-size: 0.82rem;
      color: var(--text-secondary);
      padding: 4px 0;
      line-height: 1.5;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .cue-line:last-child { border-bottom: none; }

    /* HISTORY SCREEN */
    .history-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .history-nav button {
      flex: 1;
      padding: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-glow);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: monospace;
      font-size: 0.75rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .history-nav button:hover, .history-nav button.active {
      background: rgba(69,162,158,0.15);
      border-color: var(--accent);
      color: var(--accent-bright);
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-box {
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border-glow);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent-bright);
      font-family: monospace;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: monospace;
    }
    .history-divider {
      border: none;
      border-top: 1px solid var(--border-glow);
      margin: 8px 0 16px 0;
    }
    .history-entry {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.03);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      margin-bottom: 10px;
    }
    .history-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .history-entry-date {
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
    .history-entry-rating {
      font-family: monospace;
      font-size: 0.7rem;
      letter-spacing: 1px;
      padding: 2px 10px;
      border-radius: 40px;
      border: 1px solid currentColor;
    }
    .rating-trivial    { color: #6a7f9a; }
    .rating-manageable { color: #45a29e; }
    .rating-optimal    { color: #66fcf1; }
    .rating-demanding  { color: #f0a500; }
    .rating-limit      { color: #c0392b; }
    .rating-rest       { color: #4a5568; }
    .history-exercise-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .history-exercise-list li {
      font-size: 0.8rem;
      color: var(--text-secondary);
      padding: 2px 0;
      font-family: monospace;
    }
    .history-exercise-list li span {
      color: var(--text-muted);
      margin-left: 6px;
    }
    .pattern-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-family: monospace;
      font-size: 0.8rem;
    }
    .pattern-row:last-child { border-bottom: none; }
    .pattern-name { color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; }
    .pattern-count { color: var(--accent-bright); font-weight: 700; }

    .exercise-card {
      background: rgba(0, 0, 0, 0.25);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      margin-bottom: 14px;
      border: 1px solid rgba(255, 255, 255, 0.02);
      transition: background 0.2s ease;
    }
    .exercise-card:hover {
      background: rgba(0, 0, 0, 0.35);
      border-color: rgba(69, 162, 158, 0.1);
    }
    .ex-header {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin-bottom: 8px;
    }
    .ex-number {
      background: rgba(69, 162, 158, 0.15);
      color: var(--accent-bright);
      font-weight: 700;
      font-size: 0.7rem;
      padding: 0 10px;
      border-radius: 40px;
      line-height: 22px;
    }
    .ex-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    .ex-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 24px;
      margin-bottom: 8px;
    }
    .metric {
      font-size: 0.85rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .metric strong {
      color: var(--text-primary);
      font-weight: 600;
    }
    .metric .highlight {
      color: var(--accent-bright);
      font-weight: 700;
    }
    .ex-cues {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      margin-top: 6px;
      line-height: 1.5;
    }
    .ex-cues span {
      display: inline-block;
      background: rgba(255, 255, 255, 0.03);
      padding: 2px 10px;
      border-radius: 20px;
      margin: 2px 4px 2px 0;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-top: 16px;
      margin-bottom: 4px;
      letter-spacing: 0.3px;
    }
    label:first-of-type { margin-top: 0; }
    input, select {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      transition: border 0.2s ease;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(69, 162, 158, 0.1);
    }
    .checkbox-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }
    .checkbox-grid label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 400;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 0;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.2);
      padding: 6px 14px 6px 10px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      transition: all 0.2s ease;
    }
    .checkbox-grid label:hover {
      background: rgba(69, 162, 158, 0.05);
      border-color: rgba(69, 162, 158, 0.2);
    }
    .checkbox-grid input[type="checkbox"] {
      width: auto;
      accent-color: var(--accent);
      transform: scale(1.1);
    }
    .input-group {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .input-group label {
      margin-top: 0;
      font-weight: 400;
      font-size: 0.9rem;
    }
    .input-group input {
      width: auto;
      max-width: 100px;
      padding: 8px 12px;
    }

    .rating-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 6px 0;
    }
    .rating-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 40px;
      padding: 10px 18px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      flex: 1 0 auto;
      min-width: 80px;
      text-align: center;
      background: rgba(0, 0, 0, 0.2);
    }
    .rating-btn:hover {
      background: rgba(69, 162, 158, 0.1);
      border-color: var(--accent);
      color: var(--text-primary);
    }
    .rating-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #080b12;
      box-shadow: 0 0 20px rgba(69, 162, 158, 0.25);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-bright));
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px 28px;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.95rem;
      color: #080b12;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(69, 162, 158, 0.2);
      letter-spacing: 0.5px;
      display: inline-block;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(69, 162, 158, 0.3);
    }
    .btn-primary:active { transform: translateY(0); }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-sm);
      padding: 14px 28px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-block;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
    }
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .done-state {
      text-align: center;
      padding: 30px 10px;
    }
    .done-state .big-icon { font-size: 4rem; margin-bottom: 10px; }
    .done-state h2 { font-size: 1.5rem; margin-bottom: 6px; }
    .done-state p { color: var(--text-secondary); }

    @media (max-width: 640px) {
      .header { flex-direction: column; align-items: flex-start; }
      .header-right { width: 100%; justify-content: flex-start; flex-wrap: wrap; }
      .card { padding: 18px 16px; }
      .rating-btn { flex: 1 1 45%; }
      .ex-header { flex-direction: column; align-items: flex-start; gap: 4px; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>// ============================================================

const exerciseLibrary = {
  
  // SQUAT
  bw_squat: { id:"bw_squat", name:"Bodyweight Squat", movement_pattern:"squat", equipment_required:[], difficulty:1, class_affinity:["warrior","tank","assassin","mage","ranger"], muscles_primary:["quadriceps","glutes"], muscles_secondary:["hamstrings","core"], sets_default:3, reps_min:15, reps_max:20, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"2-0-2-0", tempo_note:"Lower for 2 seconds, stand back up smoothly", regression_id:null, progression_id:"goblet_squat", cues:["[beginner] Feet about shoulder-width apart, toes pointing slightly outward","[beginner] Keep your chest up like there's a string pulling the top of your head to the ceiling","[beginner] Push your knees outward as you lower — don't let them cave inward","[intermediate] Brace your core before descending","[intermediate] Drive knees out actively throughout the movement","[intermediate] Hit parallel or below — thighs at least level with the floor","[advanced] Focus on controlled eccentric and full hip crease below knee","[advanced] Use as a warm-up or active recovery movement only"], common_mistakes:["Heels rising off the floor","Knees caving inward","Not reaching parallel depth"], tutorial_url:"https://www.youtube.com/watch?v=aclHkVaku9U", notes:"Entry point for all classes. No equipment needed." },
  goblet_squat: { id:"goblet_squat", name:"Goblet Squat (Dumbbell)", movement_pattern:"squat", equipment_required:["dumbbells"], difficulty:2, class_affinity:["warrior","tank","assassin"], muscles_primary:["quadriceps","glutes"], muscles_secondary:["hamstrings","core","upper back"], sets_default:3, reps_min:12, reps_max:15, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-1-1-0", tempo_note:"Lower for 3 seconds, pause briefly at the bottom, stand back up", regression_id:"bw_squat", progression_id:"bulgarian_split_squat_bw", cues:["[beginner] Hold the dumbbell with both hands at chest height, close to your body","[beginner] At the bottom, your elbows should point down between your knees","[beginner] Don't let the dumbbell pull you forward — keep it tight to your chest","[intermediate] Use the goblet position to actively push your elbows against your inner knees","[intermediate] Maintain an upright torso throughout — this is the main purpose of this variation","[intermediate] Pause at the bottom to reinforce depth","[advanced] Use as a warm-up tool or with tempo manipulation","[advanced] Bottom pause with diaphragmatic breathing makes this harder than it looks"], common_mistakes:["Dumbbell drifting away from chest","Elbows flaring outward instead of tracking inside knees","Rising onto toes at the bottom"], tutorial_url:"https://www.youtube.com/watch?v=MeIiIdhvXT4", notes:"The goblet position naturally teaches upright torso and good depth" },
  bulgarian_split_squat_bw: { id:"bulgarian_split_squat_bw", name:"Bulgarian Split Squat (Bodyweight)", movement_pattern:"squat", equipment_required:["chair"], difficulty:3, class_affinity:["warrior","tank","assassin","ranger"], muscles_primary:["quadriceps","glutes"], muscles_secondary:["hamstrings","hip flexors","core"], sets_default:4, reps_min:10, reps_max:12, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"3-1-1-0", tempo_note:"Lower slowly for 3 seconds, push back up. Focus on balance first", regression_id:"goblet_squat", progression_id:"bulgarian_split_squat_weighted", cues:["[beginner] Rest the top of your back foot on the chair — laces facing down","[beginner] Your front foot should be far enough forward that your front knee doesn't go way past your toes","[beginner] Lower straight down toward the floor, don't lean forward","[intermediate] Front shin should stay close to vertical at the bottom","[intermediate] Keep hips square — don't let the back hip rotate open","[intermediate] Drive through the heel of the front foot to stand","[advanced] Control hip alignment — posterior pelvic tilt at the bottom kills glute engagement","[advanced] Use as a primary strength movement even with light load due to unilateral demand"], common_mistakes:["Front foot too close to the chair causing excessive forward knee travel","Torso leaning too far forward","Rushing the descent and losing balance"], tutorial_url:"https://www.youtube.com/watch?v=2C-uNgKwPLE", notes:"Single leg work effectively doubles the load on the working leg despite light equipment" },
  bulgarian_split_squat_weighted: { id:"bulgarian_split_squat_weighted", name:"Bulgarian Split Squat (Weighted)", movement_pattern:"squat", equipment_required:["chair","dumbbells"], difficulty:4, class_affinity:["warrior","tank"], muscles_primary:["quadriceps","glutes"], muscles_secondary:["hamstrings","hip flexors","core"], sets_default:4, reps_min:8, reps_max:10, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"3-1-1-0", tempo_note:"Lower for 3 seconds, stand back up", regression_id:"bulgarian_split_squat_bw", progression_id:"bulgarian_split_squat_deficit", cues:["[beginner] Hold one dumbbell in each hand hanging at your sides","[beginner] Don't let the weight pull your shoulders forward — stand tall","[beginner] If balance feels unstable, lighten the load and nail the bodyweight version first","[intermediate] Added load makes it easier to rush — actively slow the descent","[intermediate] Squeeze glutes at the top to fully extend the hip","[intermediate] Keep dumbbells still — swinging them is a sign the weight is too heavy","[advanced] Treat the eccentric as the primary stimulus — the load is light so time under tension is your lever","[advanced] Pair with a 2-sec bottom pause for maximum quad and glute activation"], common_mistakes:["Gripping dumbbells too tightly and creating unnecessary tension in shoulders","Leaning into the dumbbells instead of staying upright","Shortening range of motion as fatigue builds"], tutorial_url:"https://www.youtube.com/watch?v=2C-uNgKwPLE", notes:"Same movement as BW version — cue the effect of added load on posture and tempo" },
  bulgarian_split_squat_deficit: { id:"bulgarian_split_squat_deficit", name:"Bulgarian Split Squat (Deficit)", movement_pattern:"squat", equipment_required:["chair","dumbbells"], difficulty:5, class_affinity:["warrior","tank"], muscles_primary:["quadriceps","glutes"], muscles_secondary:["hamstrings","hip flexors","core"], sets_default:4, reps_min:6, reps_max:8, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"3-1-2-0", tempo_note:"Lower for 3 seconds, pause 1 second, drive up for 2 seconds", regression_id:"bulgarian_split_squat_weighted", progression_id:null, cues:["[beginner] This variation is not for beginners — master the weighted version first","[intermediate] Elevate your front foot on a book or stable platform (5–10 cm is enough)","[intermediate] The increased range of motion will expose hip flexor tightness — don't force depth","[intermediate] Go slower than you think you need to","[advanced] Full hip flexor stretch at the bottom before initiating the drive up","[advanced] This is your progressive overload ceiling — volume, tempo, and pauses are your tools now","[advanced] Consider adding a backpack for load if deficit + dumbbells feels too easy"], common_mistakes:["Elevating the front foot too high before mobility allows it","Using an unstable platform that shifts under load","Cutting depth to avoid the stretch at the bottom"], tutorial_url:"https://www.youtube.com/watch?v=2C-uNgKwPLE", notes:"Ceiling of squat progression with available equipment" },
  // SQUAT — GYM
  leg_press: { id:"leg_press", name:"Leg Press", movement_pattern:"squat", equipment_required:["cable_machine"], difficulty:2, class_affinity:["warrior","tank","assassin","ranger"], muscles_primary:["quadriceps","glutes"], muscles_secondary:["hamstrings","core"], sets_default:3, reps_min:12, reps_max:15, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-1-1-0", tempo_note:"Lower the platform slowly for 3 seconds, push back up without locking the knees out completely at the top", regression_id:"bw_squat", progression_id:"barbell_back_squat", cues:["[beginner] Feet about shoulder-width apart on the platform, toes slightly outward","[beginner] Lower the platform until your knees reach roughly 90 degrees — don't let your lower back peel off the seat","[beginner] Push evenly through the whole foot — don't just drive through your toes","[intermediate] Foot position matters — higher foot placement emphasizes glutes and hamstrings, lower placement emphasizes quads","[intermediate] Don't lock out the knees at the top — keep tension on the muscle throughout","[intermediate] Controlled eccentric is where the growth stimulus is — don't just drop the weight","[advanced] A great tool for volume work after barbell squats — pre-fatigued quads respond well to leg press","[advanced] Single-leg leg press is a legitimate unilateral option if Bulgarian split squats are unavailable","[advanced] Foot position experimentation reveals your individual muscle activation pattern — there is no single correct placement"], common_mistakes:["Lower back peeling off the seat at the bottom — reduce range of motion until flexibility improves","Knees caving inward during the push — same cue as squats: drive knees out","Feet too low and range of motion too deep causing lower back rounding"], tutorial_url:"https://www.youtube.com/watch?v=IZxyjW7MPJQ", notes:"Good entry point for squat pattern when barbell technique isn't ready yet." },
  barbell_back_squat: { id:"barbell_back_squat", name:"Barbell Back Squat", movement_pattern:"squat", equipment_required:["barbell"], difficulty:3, class_affinity:["warrior","tank","assassin"], muscles_primary:["quadriceps","glutes"], muscles_secondary:["hamstrings","core","upper back","erector spinae"], sets_default:4, reps_min:5, reps_max:8, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-1-1-0", tempo_note:"Lower for 3 seconds under control, drive up with intent — the bar should move fast on the way up even if it doesn't", regression_id:"leg_press", progression_id:"barbell_front_squat", cues:["[beginner] Bar sits on the shelf of muscle across your upper back — not on your neck","[beginner] Feet slightly wider than hip-width, toes out 15–30 degrees","[beginner] Break at the hips and knees simultaneously, sit into the squat — don't just push your knees forward","[intermediate] Brace hard before you unrack — 360 degrees of tension in the core, not just sucking in your belly","[intermediate] Drive knees out actively the entire descent — they follow the toes","[intermediate] Hit depth — hip crease below the top of the knee is the standard","[advanced] The bar path should be vertical when viewed from the side — any forward drift means something is breaking down","[advanced] Compensatory acceleration on the concentric — intend to move the bar fast even under heavy load","[advanced] High bar vs low bar changes the mechanics significantly — know which you're doing and why"], common_mistakes:["Bar too high on the neck instead of sitting on the upper back shelf","Knees caving on the way up, especially under heavy load","Morning the rep — hips shoot up before the chest, turning it into a good morning"], tutorial_url:"https://www.youtube.com/watch?v=bEv6CCg2BC8", notes:"The foundational loaded squat." },
  barbell_front_squat: { id:"barbell_front_squat", name:"Barbell Front Squat", movement_pattern:"squat", equipment_required:["barbell"], difficulty:4, class_affinity:["warrior","tank"], muscles_primary:["quadriceps","glutes"], muscles_secondary:["core","upper back","thoracic extensors"], sets_default:4, reps_min:4, reps_max:6, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-1-1-0", tempo_note:"Lower for 3 seconds — the front rack position forces an upright torso, which makes depth easier but upper back strength a limiting factor", regression_id:"barbell_back_squat", progression_id:null, cues:["[beginner] Bar rests on the front of the shoulders — fingertips just under the bar, elbows high","[beginner] The high elbow position is non-negotiable — if your elbows drop, the bar rolls forward","[beginner] Cross-arm grip is an alternative if wrist mobility prevents the standard front rack","[intermediate] The front rack automatically forces an upright torso — use this to your advantage for quad emphasis","[intermediate] Upper back must stay rigid — thoracic rounding forward causes the bar to fall","[intermediate] Depth is typically easier with front squat than back squat — use it","[advanced] Front squat is the primary Olympic weightlifting squat — if you're not pursuing that, it's still superior for pure quad development","[advanced] Elbows must stay high throughout — any drop is a form break, not a style choice","[advanced] The limiting factor is usually front rack mobility and upper back strength, not leg strength — address both directly"], common_mistakes:["Elbows dropping and bar rolling forward — immediately dangerous under load","Using cross-arm grip as a permanent solution instead of addressing wrist mobility","Torso caving forward on heavy reps — the front squat is less forgiving than back squat"], tutorial_url:"https://www.youtube.com/watch?v=uYumuL_G_V0", notes:"More quad-dominant and technically demanding than back squat." },
  hack_squat_machine: { id:"hack_squat_machine", name:"Hack Squat (Machine)", movement_pattern:"squat", equipment_required:["cable_machine"], difficulty:3, class_affinity:["warrior","tank","assassin"], muscles_primary:["quadriceps"], muscles_secondary:["glutes","hamstrings","core"], sets_default:3, reps_min:10, reps_max:12, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-1-1-0", tempo_note:"Lower slowly for 3 seconds — the machine guides the path so the limiting factor is muscle endurance not balance", regression_id:"barbell_back_squat", progression_id:null, cues:["[beginner] Shoulders and back flat against the pad, feet at hip-width on the platform","[beginner] Lower until thighs reach parallel or slightly below","[beginner] Push through the whole foot — not just the toes","[intermediate] Foot position lower on the platform increases quad emphasis","[intermediate] The fixed path means this is safer under heavy load than free barbell work — use it for volume accumulation","[intermediate] Controlled eccentric is essential — the machine makes it tempting to drop the weight","[advanced] Excellent tool for high-rep quad work after primary barbell squats","[advanced] Pause reps at the bottom are extremely effective here — quads under stretch","[advanced] Single-leg version is available on most hack squat machines and is a serious unilateral option"], common_mistakes:["Heels rising off the platform","Knees caving inward on the push","Cutting range of motion short as weight increases"], tutorial_url:"https://www.youtube.com/watch?v=0tn5K9NlCfo", notes:"Machine path makes this a good hypertrophy tool." },
  // HINGE
  hip_hinge_wall: { id:"hip_hinge_wall", name:"Hip Hinge (Wall Drill)", movement_pattern:"hinge", equipment_required:[], difficulty:1, class_affinity:["warrior","tank","assassin","mage","ranger"], muscles_primary:["glutes","hamstrings"], muscles_secondary:["lower back","core"], sets_default:3, reps_min:10, reps_max:10, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"2-1-2-0", tempo_note:"Push hips back slowly until you feel a stretch in the back of your legs, then squeeze your glutes and stand back up", regression_id:null, progression_id:"rdl_bilateral", cues:["[beginner] Stand about 15 cm from a wall, feet hip-width apart","[beginner] Push your hips backward until they touch the wall","[beginner] Keep your back flat — imagine balancing a broomstick along your spine","[intermediate] Soft bend in the knees — this is not a squat, knees stay mostly straight","[intermediate] Feel the stretch in your hamstrings as hips push back, not in your lower back","[intermediate] Squeeze glutes hard to drive hips forward on the way up","[advanced] Use this to reinforce the hip hinge pattern before heavy work","[advanced] Focus on hamstring tension at end range — this is the position you want to own under load"], common_mistakes:["Bending the knees too much and turning it into a squat","Rounding the lower back instead of hinging at the hip","Not pushing hips far enough back to feel hamstring tension"], tutorial_url:"https://www.youtube.com/watch?v=YCGOhAqkCgs", notes:"Non-negotiable starting point." },
  rdl_bilateral: { id:"rdl_bilateral", name:"Romanian Deadlift — Bilateral (Dumbbells)", movement_pattern:"hinge", equipment_required:["dumbbells"], difficulty:2, class_affinity:["warrior","tank","ranger"], muscles_primary:["hamstrings","glutes"], muscles_secondary:["lower back","core","grip"], sets_default:3, reps_min:10, reps_max:12, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-1-1-0", tempo_note:"Lower the dumbbells slowly for 3 seconds until you feel a strong stretch behind your legs, then stand back up by squeezing your glutes", regression_id:"hip_hinge_wall", progression_id:"rdl_single_leg", cues:["[beginner] Hold one dumbbell in each hand in front of your thighs","[beginner] Push your hips back as you lower — the dumbbells just travel down your legs","[beginner] Stop when you feel a strong stretch in your hamstrings, not when the weights reach the floor","[intermediate] Maintain a neutral spine throughout — no rounding at the lower back","[intermediate] Think about pushing the floor away rather than pulling yourself up","[intermediate] Keep dumbbells close to your legs the entire movement","[advanced] The limiting factor with light dumbbells is hamstring tension not load — use slow eccentrics and pauses","[advanced] Drive hips forward explosively on the concentric while keeping the eccentric controlled","[advanced] Experiment with shoulder-width vs. hip-width stance to find your best hamstring activation position"], common_mistakes:["Rounding the lower back at the bottom","Bending the knees too much and turning it into a squat","Letting the dumbbells drift forward away from the legs"], tutorial_url:"https://www.youtube.com/watch?v=1uDiW5--rAE", notes:"The foundational loaded hinge." },
  rdl_single_leg: { id:"rdl_single_leg", name:"Single-Leg RDL (Contralateral Load)", movement_pattern:"hinge", equipment_required:["dumbbells"], difficulty:3, class_affinity:["warrior","assassin","ranger"], muscles_primary:["hamstrings","glutes"], muscles_secondary:["lower back","core","hip stabilizers"], sets_default:3, reps_min:8, reps_max:10, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"3-1-2-0", tempo_note:"Lower slowly for 3 seconds while keeping your balance — go only as far as you can without wobbling, then stand back up", regression_id:"rdl_bilateral", progression_id:"sliding_leg_curl", cues:["[beginner] Hold one dumbbell in the opposite hand of your standing leg","[beginner] Hinge forward slowly, letting the free leg float back behind you for balance","[beginner] Only go as low as you can while keeping your back flat — depth comes with practice","[intermediate] Contralateral load means the dumbbell is in the opposite hand to the standing leg — this creates anti-rotation demand","[intermediate] Keep hips square to the floor — the free leg wants to rotate open","[intermediate] Feel the glute of the standing leg working hard to control the descent","[advanced] Hip square alignment is everything — use a mirror or film yourself to check","[advanced] The anti-rotation demand makes this harder than it looks even with light load","[advanced] Pause at the bottom with full hip extension of the free leg for maximum glute activation"], common_mistakes:["Hips rotating open as you lower","Bending the standing knee excessively and turning it into a single-leg squat","Rushing through reps to avoid the balance challenge"], tutorial_url:"https://www.youtube.com/watch?v=ZOoRVIRFbgY", notes:"The anti-rotation demand makes this disproportionately difficult relative to the load." },
  sliding_leg_curl: { id:"sliding_leg_curl", name:"Sliding Leg Curl", movement_pattern:"hinge", equipment_required:[], difficulty:4, class_affinity:["warrior","tank","assassin"], muscles_primary:["hamstrings"], muscles_secondary:["glutes","core"], sets_default:3, reps_min:10, reps_max:12, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"2-1-4-0", tempo_note:"Slide your heels out slowly for 4 seconds, then bend your knees to slide back in. Use your hands on the floor lightly for balance if needed", regression_id:"rdl_single_leg", progression_id:"sliding_leg_curl_single", cues:["[beginner] Lie on your back, heels on a smooth floor with socks on (or on a towel)","[beginner] Push your hips up into a bridge position first","[beginner] Slowly slide both heels away from you, then pull them back in","[intermediate] Keep hips elevated throughout — don't let them sag as legs extend","[intermediate] The eccentric (sliding out) is where the hamstring work happens — control it","[intermediate] Squeeze hamstrings actively to pull heels back in","[advanced] Bilateral version should feel easy before attempting single-leg","[advanced] At the fully extended position your hamstrings are at maximum length under load — this is where most people rush","[advanced] Pair with RDL in the same session for full hamstring length spectrum training"], common_mistakes:["Hips dropping as legs slide out","Rushing the eccentric to avoid the difficulty","Feet sliding sideways instead of straight back"], tutorial_url:"https://www.youtube.com/watch?v=4K9HqBMwgTw", notes:"No equipment needed beyond socks and a smooth floor." },
  sliding_leg_curl_single: { id:"sliding_leg_curl_single", name:"Sliding Leg Curl — Single Leg", movement_pattern:"hinge", equipment_required:[], difficulty:5, class_affinity:["warrior","assassin"], muscles_primary:["hamstrings"], muscles_secondary:["glutes","core"], sets_default:3, reps_min:6, reps_max:8, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"2-1-4-0", tempo_note:"Slow eccentric for 4 seconds, then pull back in. The load on one hamstring doubles.", regression_id:"sliding_leg_curl", progression_id:null, cues:["[beginner] Master the bilateral version first — this is significantly harder","[intermediate] One leg extended in the air, working leg slides out alone","[intermediate] Keep hips square and elevated — the non-working leg will want to compensate","[intermediate] If you can't control the slide out, regress to bilateral","[advanced] This is Nordic curl territory in terms of hamstring demand","[advanced] Slow eccentrics here are a genuine injury-prevention tool — hamstring strength at long muscle lengths reduces strain risk significantly","[advanced] Can be programmed as 3–5 reps with maximum eccentric control rather than chasing higher reps"], common_mistakes:["Hips rotating toward the working side","Using the non-working leg to assist the movement","Not achieving full extension before pulling back in"], tutorial_url:"https://www.youtube.com/watch?v=4K9HqBMwgTw", notes:"Ceiling of hinge progression with no equipment." },
  dumbbell_swing: { id:"dumbbell_swing", name:"Dumbbell Swing", movement_pattern:"hinge", equipment_required:["dumbbells"], difficulty:3, class_affinity:["warrior","assassin","ranger"], muscles_primary:["glutes","hamstrings"], muscles_secondary:["core","shoulders","grip"], sets_default:5, reps_min:15, reps_max:20, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:null, tempo_note:"This is an explosive movement — there's no slow tempo. Focus on the hip snap, not swinging with your arms", regression_id:"hip_hinge_wall", progression_id:null, cues:["[beginner] Hold one dumbbell with both hands by the head of the weight","[beginner] Hinge at the hips and let the dumbbell swing back between your legs","[beginner] Snap your hips forward explosively — the dumbbell swings up from hip power, not arm strength","[intermediate] The hinge back should load the hamstrings like a spring","[intermediate] At the top, squeeze glutes hard and stand tall — don't hyperextend the lower back","[intermediate] Keep arms relaxed — tense arms bleed power from the hip drive","[advanced] With light dumbbells, volume and intent are the stimulus — 5×20 with max power per rep","[advanced] Think of it as a horizontal jump where your feet stay on the ground","[advanced] Can be used as a power finisher or as active warm-up for the hinge pattern"], common_mistakes:["Squatting down instead of hinging back","Using arms to pull the dumbbell up rather than hip drive","Hyperextending the lower back at the top of the swing"], tutorial_url:"https://www.youtube.com/watch?v=YSxHifyI6s8", notes:"With 5 kg this is a power and conditioning tool." },
  // HINGE — GYM
  barbell_rdl: { id:"barbell_rdl", name:"Barbell Romanian Deadlift", movement_pattern:"hinge", equipment_required:["barbell"], difficulty:3, class_affinity:["warrior","tank","ranger"], muscles_primary:["hamstrings","glutes"], muscles_secondary:["lower back","core","grip"], sets_default:4, reps_min:8, reps_max:10, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-1-1-0", tempo_note:"Lower the bar slowly for 3 seconds — it should travel down your legs like a shave. Stand back up by squeezing your glutes, not by pulling with your lower back", regression_id:"rdl_bilateral", progression_id:"conventional_deadlift", cues:["[beginner] Hold the bar with a double-overhand grip just outside hip-width","[beginner] Push your hips back as the bar travels down — it should graze your thighs the whole way","[beginner] Stop when you feel a strong hamstring stretch — for most people that's just below the knee","[intermediate] The bar path should be vertical and close to the body — any forward drift loads the lower back","[intermediate] Neutral spine throughout — not hyperextended, not rounded","[intermediate] Drive hips through at the top — squeeze glutes hard at lockout","[advanced] Grip will limit you before hamstrings do — mixed grip or straps are legitimate tools once form is solid","[advanced] The barbell allows far more load than dumbbells — this is where hamstring and glute development becomes serious","[advanced] Romanian vs conventional distinction: RDL starts from standing, goes to hamstring stretch, never touches the floor between reps"], common_mistakes:["Bar drifting away from the legs — dramatically increases lower back shear force","Rounding the lower back at the bottom instead of hinging","Treating it like a deadlift and going all the way to the floor — that's a different exercise"], tutorial_url:"https://www.youtube.com/watch?v=JCXUYuzwNrM", notes:"The primary loaded hamstring exercise once dumbbells become insufficient." },
  conventional_deadlift: { id:"conventional_deadlift", name:"Conventional Deadlift", movement_pattern:"hinge", equipment_required:["barbell"], difficulty:3, class_affinity:["warrior","tank"], muscles_primary:["hamstrings","glutes","erector spinae"], muscles_secondary:["trapezius","quadriceps","core","grip","latissimus dorsi"], sets_default:4, reps_min:3, reps_max:5, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:null, tempo_note:"There's no slow eccentric in a competition deadlift — but for training, lower the bar under control in 2–3 seconds. The concentric should be as fast as possible", regression_id:"barbell_rdl", progression_id:null, cues:["[beginner] Bar over mid-foot, hip-width stance, hands just outside the knees","[beginner] Hinge down to the bar — don't squat to it. Shoulders slightly in front of the bar","[beginner] Push the floor away rather than thinking about pulling the bar up","[intermediate] Lat engagement before you pull — think about bending the bar or protecting your armpits","[intermediate] The hips and shoulders should rise at the same rate — if the hips shoot up first it becomes a back-dominant movement","[intermediate] Full lockout at the top — hips through, glutes squeezed, standing completely upright","[advanced] Brace the core like you're about to take a punch — intraabdominal pressure protects the spine under heavy load","[advanced] The bar should drag up your shins and thighs — if it swings away from you the mechanics are wrong","[advanced] Submaximal speed work — pulling 60–70% as fast as possible builds rate of force development"], common_mistakes:["Bar too far from the body — the most common and dangerous error","Hips too low turning it into a squat-deadlift hybrid with poor mechanics for both","Jerking the bar off the floor — the slack must be taken out of the bar before initiating the pull"], tutorial_url:"https://www.youtube.com/watch?v=op9kVnSso6Q", notes:"One of the most important human movements. Learn it properly." },
  trap_bar_deadlift: { id:"trap_bar_deadlift", name:"Trap Bar Deadlift", movement_pattern:"hinge", equipment_required:["barbell"], difficulty:2, class_affinity:["warrior","tank","assassin","ranger"], muscles_primary:["hamstrings","glutes","quadriceps"], muscles_secondary:["erector spinae","trapezius","core","grip"], sets_default:4, reps_min:5, reps_max:8, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"2-1-1-0", tempo_note:"Lower under control, drive up with intent — the neutral grip and upright torso make this more forgiving than a straight bar", regression_id:"barbell_rdl", progression_id:"conventional_deadlift", cues:["[beginner] Step inside the trap bar, feet hip-width apart, handles at your sides","[beginner] Hinge down and grip the handles — shoulders back, chest up","[beginner] Push the floor away and stand up — this feels more intuitive than a straight bar deadlift","[intermediate] The trap bar allows a more upright torso than conventional deadlift — this shifts more load to the quads","[intermediate] High handles vs low handles: high handles reduce range of motion and are easier — start there","[intermediate] Full hip extension and glute squeeze at lockout","[advanced] The trap bar deadlift is arguably the best single exercise available in a gym — combines squat and hinge, lower back friendly, easy to load heavy","[advanced] Transition to conventional deadlift once trap bar mechanics are solid — the hip hinge pattern transfers directly","[advanced] Velocity-based training works well here — track bar speed to ensure each set is submaximal"], common_mistakes:["Torso falling too far forward — the bar wants to swing forward if you don't stay centered","Not using full range of motion when low handles are available","Rushing the setup and not engaging lats before the pull"], tutorial_url:"https://www.youtube.com/watch?v=sABMmE1ue_0", notes:"Lower skill floor than conventional deadlift. Start here if new to deadlifting." },
  good_morning: { id:"good_morning", name:"Good Morning", movement_pattern:"hinge", equipment_required:["barbell"], difficulty:4, class_affinity:["warrior","tank"], muscles_primary:["hamstrings","erector spinae","glutes"], muscles_secondary:["core","upper back"], sets_default:3, reps_min:8, reps_max:10, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-1-2-0", tempo_note:"Hinge forward slowly for 3 seconds — bar stays on the back, chest goes toward the floor. Drive back up by squeezing the glutes and hamstrings", regression_id:"barbell_rdl", progression_id:null, cues:["[beginner] Light bar on the upper back — same position as back squat","[beginner] Soft bend in the knees, then hinge forward at the hips until your torso is roughly parallel to the floor","[beginner] Keep your lower back neutral throughout — this is not a rounding exercise","[intermediate] Feel the hamstring stretch at the bottom — identical to an RDL but with the bar on your back instead of in your hands","[intermediate] The erector spinae work isometrically to maintain spinal position — this is the primary benefit over RDL","[intermediate] Start extremely light — the lever arm with a bar on your back is much longer than it looks","[advanced] This is a posterior chain developer and spinal erector strengthener simultaneously","[advanced] Heavy good mornings are for experienced lifters only — the injury risk with improper form is high","[advanced] Pair with RDL in the same session for complete posterior chain coverage from different angles"], common_mistakes:["Too much weight — the good morning looks deceptively simple but the lever arm is brutal","Rounding the lower back under load — severe injury risk","Knees bending too much and turning it into a squat"], tutorial_url:"https://www.youtube.com/watch?v=YA-h3n9L4YU", notes:"Underused posterior chain exercise. Start with an empty bar." },

  // PULL
  scapular_pullup: { id:"scapular_pullup", name:"Scapular Pull-up", movement_pattern:"pull", equipment_required:["pull_up_bar"], difficulty:1, class_affinity:["warrior","assassin","mage","ranger","tank"], muscles_primary:["lower trapezius","serratus anterior"], muscles_secondary:["rhomboids","rear deltoid"], sets_default:3, reps_min:10, reps_max:12, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"2-2-2-0", tempo_note:"Hang from the bar with straight arms, then squeeze your shoulder blades down and together without bending your elbows — hold for 2 seconds, then relax", regression_id:null, progression_id:"dead_hang", cues:["[beginner] Hang from the bar with arms fully straight","[beginner] Without bending your elbows, pull your shoulder blades down toward your back pockets","[beginner] You'll rise slightly — that's correct. Hold that position briefly then relax back down","[intermediate] Think 'shoulders away from ears' as you initiate the movement","[intermediate] This trains the scapular depressors — the muscles that should fire before your arms pull","[intermediate] If you skip this pattern, your upper traps will dominate every pull and cause shoulder impingement over time","[advanced] Non-negotiable warm-up before any pull session","[advanced] Focus on the mind-muscle connection to lower traps — this is often neurologically underdeveloped even in strong people","[advanced] Pair with band pull-aparts if available for complete scapular health"], common_mistakes:["Bending the elbows and turning it into a partial pull-up","Shrugging the shoulders up instead of pulling them down","Rushing through reps without feeling the scapular movement"], tutorial_url:"https://www.youtube.com/watch?v=FgYoc4O-cio", notes:"Prerequisite movement." },
  dead_hang: { id:"dead_hang", name:"Dead Hang", movement_pattern:"pull", equipment_required:["pull_up_bar"], difficulty:1, class_affinity:["warrior","assassin","tank","ranger","mage"], muscles_primary:["grip","forearms","latissimus dorsi"], muscles_secondary:["shoulder stabilizers","thoracic spine decompression"], sets_default:3, reps_min:null, reps_max:null, rep_mode:"timed", is_unilateral:false, duration_seconds:30, tempo_code:null, tempo_note:"Just hang. Breathe slowly. Stop before your grip completely fails — leaving 5 seconds in reserve protects your tendons", regression_id:"scapular_pullup", progression_id:"negative_pullup", cues:["[beginner] Grab the bar with both hands slightly wider than shoulder-width","[beginner] Let your body hang fully — don't tense up or shrug your shoulders","[beginner] Breathe normally and just hold on as long as comfortable","[intermediate] Actively pull shoulders down away from ears while hanging — don't just passively dangle","[intermediate] This decompresses the spine and builds shoulder capsule health simultaneously","[intermediate] Stop 5 seconds before grip failure every set — tendons adapt slower than muscles","[advanced] Active hang — scapulae depressed, core lightly braced, feet slightly in front","[advanced] Use as spinal decompression after any heavy lower back session","[advanced] Progress toward one-arm assisted hang when two-arm feels easy"], common_mistakes:["Shrugging shoulders up toward ears during the hang","Hanging to complete grip failure — tendon overuse risk","Holding breath instead of breathing through the hang"], tutorial_url:"https://www.youtube.com/watch?v=F-xEL0Zt9Oo", notes:"Grip strength is a strong longevity predictor." },

  pullup_strict: { id:"pullup_strict", name:"Pull-up — Strict", movement_pattern:"pull", equipment_required:["pull_up_bar"], difficulty:3, class_affinity:["warrior","assassin","tank","ranger"], muscles_primary:["latissimus dorsi","biceps","rear deltoid"], muscles_secondary:["rhomboids","core","grip","lower trapezius"], sets_default:4, reps_min:5, reps_max:8, rep_mode:"total", is_unilateral:false, duration_seconds:null, tempo_code:"3-1-1-0", tempo_note:"Pull up until your chin clears the bar, lower yourself fully with control — no swinging or kipping", regression_id:"negative_pullup", progression_id:"chinup", cues:["[beginner] Grip slightly wider than shoulders, palms facing away","[beginner] Pull until chin clears the bar — chest approaching the bar is even better","[beginner] Lower all the way down to full arm extension every rep","[intermediate] Initiate with scapular depression before the arms pull — the lat should engage first","[intermediate] Think about pulling your elbows toward your hips, not just pulling your hands down","[intermediate] No kipping — momentum is the enemy of strength here","[advanced] Chest-to-bar is the standard — chin over bar is the minimum","[advanced] Full dead hang between reps for maximum range of motion","[advanced] Hollow body position — ribs down, slight posterior pelvic tilt — protects the lower back"], common_mistakes:["Kipping or swinging to generate momentum","Not reaching full extension at the bottom","Chin barely clearing the bar and calling it a rep"], tutorial_url:"https://www.youtube.com/watch?v=eGo4IYlbE5g", notes:"The single best upper body pulling exercise." },

  dumbbell_row_single_arm: { id:"dumbbell_row_single_arm", name:"Single-Arm Dumbbell Row", movement_pattern:"pull", equipment_required:["dumbbells","chair"], difficulty:2, class_affinity:["warrior","assassin","tank","ranger"], muscles_primary:["latissimus dorsi","rhomboids"], muscles_secondary:["biceps","rear deltoid","core — anti-rotation"], sets_default:3, reps_min:10, reps_max:12, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"2-1-3-0", tempo_note:"Pull up to the hip, hold briefly, lower slowly for 3 seconds — the goal is maximum lat stretch at the bottom and maximum contraction at the top", regression_id:"cable_row_seated", progression_id:"barbell_row_bent_over", cues:["[beginner] One knee and same-side hand on the bench, other foot on the floor","[beginner] Pull the dumbbell from a hanging position up to your hip — not your armpit","[beginner] Hold at the top and squeeze the lat before lowering","[intermediate] Let the dumbbell stretch the lat fully at the bottom — allow slight scapular protraction","[intermediate] Drive the elbow back and up — the dumbbell just follows","[intermediate] Don't rotate the torso to help the pull — keep hips square","[advanced] The unilateral nature allows greater range of motion than barbell rows","[advanced] A full stretch at the bottom followed by a full contraction at the top is the stimulus — not just moving the weight through space","[advanced] Heavy dumbbells here are one of the most effective back exercises available without a cable machine"], common_mistakes:["Pulling to the armpit instead of the hip — changes the muscle emphasis","Rotating the torso to assist the pull — reduces the unilateral demand","Not allowing the lat to fully stretch at the bottom — cuts the range of motion"], tutorial_url:"https://www.youtube.com/watch?v=pYcpY20QaE8", notes:"The dumbbell row beats most machine rows for lat development." },

  pushup_archer: { id:"pushup_archer", name:"Archer Push-up", movement_pattern:"push", equipment_required:[], difficulty:4, class_affinity:["warrior","assassin"], muscles_primary:["pectoralis major","anterior deltoid","triceps"], muscles_secondary:["serratus anterior","core","biceps — lengthened"], sets_default:3, reps_min:6, reps_max:10, rep_mode:"per_side", is_unilateral:true, duration_seconds:null, tempo_code:"3-1-2-0", tempo_note:"Lower toward one hand slowly for 3 seconds — the opposite arm straightens out to the side. Push back to center", regression_id:"pushup_diamond", progression_id:"pushup_feet_elevated", cues:["[beginner] Start in a wide push-up position — hands much wider than standard","[beginner] Lower toward one hand while the opposite arm straightens — that arm acts as a guide, not a support","[beginner] Push back to center and repeat on the other side","[intermediate] The straight arm should have minimal weight on it — most load should be on the bending arm","[intermediate] Think of it as a one-arm push-up with a balance assist","[intermediate] Keep hips square — don't rotate toward the working side","[advanced] The straighter you keep the assisting arm, the harder the working side works","[advanced] This is a direct progression toward one-arm push-ups","[advanced] Film yourself from the front to check hip rotation — it's easy to cheat without noticing"], common_mistakes:["Pushing equally through both arms — defeats the unilateral purpose","Hips rotating toward the working side","Insufficient width in starting hand position making the movement impossible to perform correctly"], tutorial_url:"https://www.youtube.com/watch?v=F0GFmfUNzKo", notes:"Bridges the gap between standard push-ups and one-arm push-ups." },
